<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e0e0e8;--text-dim:#6b6f80;--accent:#4ecdc4;--red:#ff6b6b;--red-glow:rgba(255,107,107,0.25);--gold:#f0c040;--green:#6bcf7f}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0.6rem 0.8rem 0.8rem;-webkit-tap-highlight-color:transparent;overflow:hidden}
  .container{max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;height:100%;overflow:hidden}

  /* Header */
  .hdr{width:100%;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.15rem;flex-shrink:0}
  .hdr-left{display:flex;flex-direction:column}
  .hdr-title{font-family:'JetBrains Mono',monospace;font-size:0.85rem;font-weight:600;color:var(--accent);letter-spacing:0.1em}
  .hdr-sub{font-size:0.45rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.05em}
  .hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.25rem}
  .hdr-icons{display:flex;gap:0.25rem}
  .ib{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
  .ib:active{border-color:var(--accent);color:var(--accent)}
  .ib svg{width:13px;height:13px;fill:currentColor}
  .dt{width:5px;height:5px;border-radius:50%;background:var(--red);position:absolute;top:-1px;right:-1px}
  .dt.on{background:var(--green)}
  .lt{display:flex;gap:0.15rem;background:var(--surface);border-radius:4px;padding:0.1rem;border:1px solid var(--border)}
  .lb{font-family:'JetBrains Mono',monospace;font-size:0.45rem;padding:0.15rem 0.35rem;border:none;background:transparent;color:var(--text-dim);border-radius:3px;cursor:pointer}
  .lb.active{background:var(--accent);color:var(--bg)}

  /* Settings */
  .sp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.8rem;margin-bottom:0.4rem;display:none;flex-shrink:0;max-height:50vh;overflow-y:auto}
  .sp.open{display:block}
  .sp-t{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.6rem}
  .fg{margin-bottom:0.6rem}
  .fl{font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.25rem}
  .fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:0.5rem;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.65rem;outline:none}
  .fi:focus{border-color:var(--accent)}
  .fi::placeholder{color:var(--text-dim)}
  .sb{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--bg);background:var(--accent);border:none;border-radius:4px;padding:0.35rem 0.8rem;cursor:pointer}
  .ks{font-family:'JetBrains Mono',monospace;font-size:0.5rem;margin-top:0.25rem}
  .ks.ok{color:var(--green)}.ks.err{color:var(--red)}

  /* Avatar */
  .av{width:100%;flex:1;min-height:0;position:relative}
  #avatarCanvas{width:100%;height:100%;display:block}
  .av-load{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text-dim)}

  /* Mic floating */
  .mic-f{position:absolute;top:4px;left:50%;transform:translateX(-50%);z-index:10}
  .mic-b{width:56px;height:56px;border-radius:50%;border:2px solid var(--border);background:rgba(26,29,39,0.85);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;touch-action:manipulation;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:all 0.2s}
  .mic-b:active{transform:scale(0.93)}
  .mic-b svg{width:24px;height:24px;fill:currentColor}
  .mic-b.on{border-color:var(--red);color:var(--red);box-shadow:0 0 20px var(--red-glow);animation:mp 1.5s ease-in-out infinite}
  @keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .mic-s{position:absolute;top:62px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--text-dim);white-space:nowrap;background:rgba(15,17,23,0.7);padding:0.08rem 0.3rem;border-radius:3px}
  .mic-s.on{color:var(--red)}

  /* Convo */
  .cb{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.5rem 0.7rem;max-height:110px;text-align:left;margin-top:0.3rem;overflow-y:auto;position:relative;flex-shrink:0}
  .cb.th{border-color:var(--gold)}
  .cb.th::after{content:'';position:absolute;bottom:0;left:0;height:2px;background:var(--gold);animation:bl 1.5s ease-in-out infinite}
  @keyframes bl{0%{width:0;left:0}50%{width:60%;left:20%}100%{width:0;left:100%}}
  .cl{font-family:'JetBrains Mono',monospace;font-size:0.45rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.3rem}
  .m{margin-bottom:0.35rem;padding:0.35rem 0.55rem;border-radius:8px;font-size:0.75rem;line-height:1.35;max-width:92%;word-break:break-word}
  .m.u{background:rgba(78,205,196,0.1);border:1px solid rgba(78,205,196,0.2);margin-left:auto;color:var(--accent);text-align:right}
  .m.b{background:rgba(107,111,128,0.1);border:1px solid rgba(107,111,128,0.15);color:var(--text)}
  .m.b.ask{background:rgba(240,192,64,0.08);border:1px solid rgba(240,192,64,0.2);color:var(--gold)}
  .m.b.cfm{background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.2)}
  .m.b.ok{background:rgba(107,207,127,0.1);border:1px solid rgba(107,207,127,0.25);color:var(--green)}
  .m.b.err{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);color:var(--red)}
  .m.b.jk{background:rgba(240,192,64,0.06);border:1px solid rgba(240,192,64,0.15);color:var(--gold);font-style:italic;font-size:0.7rem}
  .cd{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--text-dim);display:block;margin-top:0.1rem}
  .ht{font-size:0.55rem;color:var(--text-dim);font-style:italic;margin-top:0.15rem}

  .br{display:flex;gap:0.3rem;margin-top:0.3rem;width:100%;flex-shrink:0}
  .br button{font-family:'JetBrains Mono',monospace;font-size:0.5rem;background:none;border-radius:4px;padding:0.25rem 0.5rem;cursor:pointer}
  .br .c1{color:var(--text-dim);border:1px solid var(--border)}
  .br .c2{color:var(--red);border:1px solid rgba(255,107,107,0.3)}
  .unsup{background:rgba(255,107,107,0.1);border:1px solid var(--red);border-radius:8px;padding:0.5rem;font-size:0.7rem;color:var(--red);margin-bottom:0.3rem;width:100%;text-align:center;flex-shrink:0}
</style>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/","@pixiv/three-vrm":"https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.min.js"}}

<!-- ======== AVATAR MODULE ======== -->
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

const canvas = document.getElementById('avatarCanvas');
const container = document.getElementById('avArea');
const loadEl = document.getElementById('avLoad');

const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(20, 1, 0.1, 20);
camera.position.set(0, 0.65, 4.2);
camera.lookAt(0, 0.65, 0);

function resize(){
  const w = container.clientWidth;
  const h = container.clientHeight;
  if(w<1||h<1) return;
  renderer.setSize(w, h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}

scene.add(new THREE.AmbientLight(0xccccdd, 1.0));
const kl = new THREE.DirectionalLight(0xffeedd,1.2); kl.position.set(1,2,2); scene.add(kl);
const fl = new THREE.DirectionalLight(0x4ecdc4,0.3); fl.position.set(-1,1,1); scene.add(fl);
const rl = new THREE.DirectionalLight(0x4ecdc4,0.4); rl.position.set(0,1,-2); scene.add(rl);

const loader = new GLTFLoader();
loader.register(p => new VRMLoaderPlugin(p));

let vrm = null;
let avState = 'idle';
const clock = new THREE.Clock();
let blinkT=0, nextBlink=2+Math.random()*3;
let mouthP=0, breathP=0, poseP=0;

// Safe bone access
function bone(name) {
  return vrm?.humanoid?.getNormalizedBoneNode(name) || null;
}

// Safe expression
function expr(name, val) {
  try { vrm?.expressionManager?.setValue(name, val); } catch(e) {}
}

function resetExpr() {
  ['happy','angry','sad','surprised','relaxed','aa','ih','ou','ee','oh','blink','blinkLeft','blinkRight','lookUp','lookDown','lookLeft','lookRight'].forEach(n => expr(n, 0));
}

// Lerp a bone rotation toward target
function lerpBone(name, tx, ty, tz, speed, dt) {
  const b = bone(name);
  if(!b) return;
  const s = 1 - Math.pow(0.01, dt * speed);
  b.rotation.x += (tx - b.rotation.x) * s;
  b.rotation.y += (ty - b.rotation.y) * s;
  b.rotation.z += (tz - b.rotation.z) * s;
}

loader.load('./LilTeddy.vrm',
  (gltf) => {
    vrm = gltf.userData.vrm;
    try { VRMUtils.combineSkeletons(vrm.scene); } catch(e) {
      try { VRMUtils.removeUnnecessaryJoints(vrm.scene); } catch(e2) {}
    }
    scene.add(vrm.scene);
    vrm.scene.rotation.y = Math.PI;

    // Log available bones
    const testBones = ['hips','spine','chest','upperChest','neck','head','leftShoulder','rightShoulder','leftUpperArm','leftLowerArm','leftHand','rightUpperArm','rightLowerArm','rightHand','leftUpperLeg','leftLowerLeg','leftFoot','rightUpperLeg','rightLowerLeg','rightFoot'];
    const found = [];
    testBones.forEach(n => { if(bone(n)) found.push(n); });
    console.log('Available bones:', found);
    console.log('Expressions:', vrm.expressionManager?.expressions?.map(e=>e.expressionName) || []);

    loadEl.style.display = 'none';
    if(window.onTeddyReady) window.onTeddyReady();
  },
  (p) => { if(p.total>0) loadEl.textContent = `učitavam... ${Math.round(p.loaded/p.total*100)}%`; },
  (e) => { loadEl.textContent = '❌ greška'; loadEl.style.color='#ff6b6b'; console.error(e); }
);

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();
  if(!vrm){renderer.render(scene,camera);return;}

  // Breathing
  breathP += dt * 1.2;
  vrm.scene.position.y = Math.sin(breathP) * 0.004;

  // Blinking
  blinkT += dt;
  if(blinkT > nextBlink){
    expr('blink',1); expr('blinkLeft',1); expr('blinkRight',1);
    setTimeout(()=>{expr('blink',0);expr('blinkLeft',0);expr('blinkRight',0);},130);
    blinkT=0; nextBlink=2+Math.random()*4;
  }

  const sp = 3; // lerp speed

  switch(avState) {
    case 'idle': // Cross arms — arms folded in front
      lerpBone('spine', 0, Math.sin(t*0.5)*0.015, 0, sp, dt);
      lerpBone('rightUpperArm', 0.4, 0, 0.8, sp, dt);
      lerpBone('rightLowerArm', 0, 0, 1.3, sp, dt);
      lerpBone('leftUpperArm', 0.4, 0, -0.8, sp, dt);
      lerpBone('leftLowerArm', 0, 0, -1.3, sp, dt);
      lerpBone('head', 0, Math.sin(t*0.3)*0.03, 0, sp, dt);
      expr('relaxed', 0.2);
      break;

    case 'listening':
      lerpBone('spine', 0.03, 0, 0, sp, dt);
      lerpBone('rightUpperArm', 0.3, 0, 0.9, sp, dt);
      lerpBone('rightLowerArm', 0, 0, 1.0, sp, dt);
      lerpBone('leftUpperArm', 0.3, 0, -0.9, sp, dt);
      lerpBone('leftLowerArm', 0, 0, -1.0, sp, dt);
      lerpBone('head', 0.05, 0, Math.sin(t*2)*0.03, sp, dt);
      expr('happy', 0.15);
      break;

    case 'thinking':
      lerpBone('spine', 0, 0, 0.03, sp, dt);
      lerpBone('head', 0, 0.1, 0.05, sp, dt);
      lerpBone('rightUpperArm', 0.5, 0, 0.7, sp, dt);
      lerpBone('rightLowerArm', 0.3, 0, 1.5, sp, dt);
      lerpBone('leftUpperArm', 0.3, 0, -0.9, sp, dt);
      lerpBone('leftLowerArm', 0, 0, -1.0, sp, dt);
      expr('lookLeft', 0.3); expr('lookUp', 0.2);
      break;

    case 'speaking': // Cycle bounce + leanback
      poseP += dt * 0.7;
      const blend = (Math.sin(poseP) + 1) / 2;

      // Bounce values
      const bSpineX = 0.06;
      const bRArmZ = 0.5, bLArmZ = -0.5;

      // Leanback values
      const lSpineX = -0.08;
      const lRArmZ = 0.2, lLArmZ = -1.0;

      const sX = bSpineX + (lSpineX - bSpineX) * blend;
      const rZ = bRArmZ + (lRArmZ - bRArmZ) * blend;
      const lZ = bLArmZ + (lLArmZ - bLArmZ) * blend;

      lerpBone('spine', sX, 0, 0, sp, dt);
      lerpBone('rightUpperArm', 0.2, 0, rZ, sp, dt);
      lerpBone('rightLowerArm', -0.2, 0, 0.5, sp, dt);
      lerpBone('leftUpperArm', 0.3, 0, lZ, sp, dt);
      lerpBone('leftLowerArm', -0.1, 0, -0.6, sp, dt);
      lerpBone('head', Math.sin(t*3)*0.04, Math.sin(t*1.5)*0.03, 0, sp, dt);

      // Lip sync — cycle through vowels
      mouthP += dt * 8;
      const aa = Math.max(0, Math.sin(mouthP) * 0.6);
      const oh = Math.max(0, Math.sin(mouthP * 0.7 + 1.5) * 0.4);
      const ee = Math.max(0, Math.sin(mouthP * 1.3 + 3) * 0.3);
      expr('aa', aa); expr('oh', oh); expr('ee', ee); expr('ih', ee * 0.5);
      expr('happy', 0.15);
      break;

    case 'saved': // Point at camera
      lerpBone('spine', 0.05, 0, 0, sp*1.5, dt);
      lerpBone('rightUpperArm', 0.8, 0.3, 0.0, sp*1.5, dt);
      lerpBone('rightLowerArm', -0.3, 0, 0, sp*1.5, dt);
      lerpBone('leftUpperArm', 0.2, 0, -1.0, sp*1.5, dt);
      lerpBone('leftLowerArm', 0, 0, -1.2, sp*1.5, dt);
      lerpBone('head', 0, 0, 0, sp, dt);
      expr('happy', 0.7);
      break;

    case 'confused': // Wave arms
      const wv = Math.sin(t * 3) * 0.3;
      lerpBone('spine', 0, 0, Math.sin(t*2)*0.04, sp, dt);
      lerpBone('rightUpperArm', -0.3+wv, 0, -0.2, sp, dt);
      lerpBone('rightLowerArm', -0.5, 0, 0.3, sp, dt);
      lerpBone('leftUpperArm', -0.3-wv, 0, 0.2, sp, dt);
      lerpBone('leftLowerArm', -0.5, 0, -0.3, sp, dt);
      lerpBone('head', 0, Math.sin(t*2)*0.08, Math.sin(t*3)*0.05, sp, dt);

function speak(text, onEnd) {

  fetch(`https://texttospeech.googleapis.com/v1beta1/text:synthesize?key=${TTS_KEY}`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      input:{text:text},
      voice:{languageCode:'sr-RS',name:TTS_VOICE},
      audioConfig:{audioEncoding:'MP3',speakingRate:1.0,pitch:0}
    })
  })
  .then(r=>{if(!r.ok)throw new Error('TTS '+r.status);return r.json();})
  .then(data=>{
    const audio = new Audio('data:audio/mp3;base64,'+data.audioContent);
    currentAudio = audio;
    audio.onended = ()=>{currentAudio=null;if(onEnd)onEnd();};
    audio.onerror = ()=>{currentAudio=null;if(onEnd)onEnd();};
    audio.play().catch(()=>{if(onEnd)onEnd();});
  })
  .catch(e=>{
    console.warn('Google TTS failed, using browser:', e);
    // Fallback to browser TTS
    const u=new SpeechSynthesisUtterance(text);
    u.lang='hr-HR'; u.rate=0.9; u.pitch=1.1;
    const voices=speechSynthesis.getVoices();
    const hrV=voices.find(v=>v.lang.startsWith('hr'))||voices.find(v=>v.lang.startsWith('sr'));
    if(hrV)u.voice=hrV;
    u.onend=()=>{if(onEnd)onEnd();};
    u.onerror=()=>{if(onEnd)onEnd();};
    speechSynthesis.speak(u);
  });
}

// ---- Calendar read ----
async function fetchEvents(days){
  if(!gToken) return null;
  const now=new Date();
  const start=new Date(now); start.setHours(0,0,0,0);
  const end=new Date(start); end.setDate(end.getDate()+days);
  end.setHours(23,59,59,999);
  try{
    const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`,{
      headers:{'Authorization':`Bearer ${gToken}`}
    });
    if(r.status===401){gToken=null;gDot.className='dt';return null;}
    if(!r.ok) return null;
    const data=await r.json();
    return data.items||[];
  }catch(e){return null;}
}

function formatEvents(events, label){
  if(!events||events.length===0) return `${label}: Nemaš ništa zakazano. Uživaj.`;
  const lines=events.map(e=>{
    const s=e.start?.dateTime?new Date(e.start.dateTime).toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}):'cijeli dan';
    return `${s} — ${e.summary||'bez naziva'}`;
  });
  return `${label}: ${lines.join('. ')}`;
}

// ---- Calendar event create ----
async function createEvent(r){
  if(!gToken)return false;
  const s=new Date(`${r.date}T${r.time}:00`),e=new Date(s.getTime()+30*60000),tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  try{
    const res=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',headers:{'Authorization':`Bearer ${gToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({summary:r.label,description:`Podsjetnik: ${r.msg}`,start:{dateTime:s.toISOString(),timeZone:tz},end:{dateTime:e.toISOString(),timeZone:tz},reminders:{useDefault:false,overrides:[{method:'popup',minutes:10},{method:'popup',minutes:0}]}})
    });
    if(res.status===401){gToken=null;gDot.className='dt';return false;}
    return res.ok;
  }catch(e){return false;}
}

// ---- Brain ----
async function callAI(text, extra){
  const n=getNow();
  const base=`Ti si parser govornih komandi. Korisnik govori bosanski/hrvatski/srpski.
Danas: ${n.day}, ${n.date}. Vrijeme: ${n.time}.
Odgovori SAMO JSON. Bez teksta, markdown-a, backtick-ova.
Datumi: "sutra"=sutrašnji datum, "prekosutra"=za 2 dana, "u petak"=sljedeći petak, "navečer"=20:00, "ujutro"=08:00, "popodne"=14:00. Nema datuma=null. Nema vremena=null.`;

  const sys=extra?base+'\n\n'+extra:base+`

Za PODSJETNIK (zapamti, podsjeti, podsjećanje, reminder): {"action":"reminder","message":"opis","date":"YYYY-MM-DD ili null","time":"HH:MM ili null","suggested_label":"kratak naziv"}
Za KALENDAR (šta imam, raspored, kalendar, zakazano, schedule): {"action":"calendar","scope":"today ili week"}
Za PITANJE (sve ostalo što nije reminder ni kalendar): {"action":"question","message":"odgovor u 2 rečenice, informativan i zanimljiv"}
Za NEJASNO (besmislice, nerazumljivo): {"action":"unclear","message":"opis"}`;

  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,system:sys,messages:[{role:'user',content:text}]})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`API ${r.status}: ${e?.error?.message||r.statusText}`);}
  const d=await r.json();
  return JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
}

// ---- Handle input by state ----
async function handle(text){
  if(!apiKey){teddySay('Brate, nema API ključa. Otvori postavke.','err','idle');return;}
  if(busy)return;
  busy=true;cBox.classList.add('th');av('thinking');resetIdle();

  try{
    switch(st){
      case 'IDLE':{
        const p=await callAI(text);

        if(p.action==='reminder'){
          pend.msg=p.message||text;pend.date=p.date||'';pend.time=p.time||'';pend.label=p.suggested_label||p.message||text;
          if(!pend.date){st='NEED_DATE';teddySay('Koji datum?','ask');}
          else if(!pend.time){st='NEED_TIME';teddySay(`📅 ${pend.date}. U koliko sati?`,'ask');}
          else goConfirm();
        }
        else if(p.action==='calendar'){
          const days=p.scope==='week'?7:1;
          const label=days===7?'Ova sedmica':'Danas';
          if(!gToken){teddySay('Brate, prvo poveži Google Calendar.','ask','idle');}
          else{
            const ev=await fetchEvents(days);
            const txt=formatEvents(ev,label);
            teddySay(txt,'');
          }
        }
        else if(p.action==='question'){
          teddySay(p.message||'Nemam pojma.','');
        }
        else{
          const line=rndConfused();
          av('confused');addBot(line,'ask');
          speak(line,()=>av('idle'));
        }
        break;
      }
      case 'NEED_DATE':{
        const p=await callAI(text,`Korisnik odgovara "koji datum?". Vrati: {"date":"YYYY-MM-DD ili null","time":"HH:MM ili null"}`);
        if(p.date){pend.date=p.date;if(p.time)pend.time=p.time;if(!pend.time){st='NEED_TIME';teddySay(`📅 ${pend.date}. U koliko sati?`,'ask');}else goConfirm();}
        else teddySay('Ne kužim datum. Reci sutra, u petak, ili neki datum.','ask');
        break;
      }
      case 'NEED_TIME':{
        const p=await callAI(text,`Korisnik odgovara "u koliko sati?". Vrati: {"time":"HH:MM ili null"}`);
        if(p.time){pend.time=p.time;goConfirm();}
        else teddySay('Ne kužim vrijeme. Reci u devet, navečer, u 15 i 30.','ask');
        break;
      }
      case 'CONFIRM':{
        const r=chkCfm(text);
        if(r==='yes')await saveRem();
        else if(r==='no'){st='NEED_LABEL';teddySay('Reci mi kako da ga nazovem.','ask');}
        else teddySay('Reci da ili promijeni.','ask');
        break;
      }
      case 'NEED_LABEL':{pend.label=text.trim();await saveRem();break;}
    }
  }catch(e){
    addBot(`❌ ${esc(e.message)}`,'err');av('idle');
  }finally{cBox.classList.remove('th');busy=false;}
}

function goConfirm(){
  st='CONFIRM';

  av('speaking');
  speak(`Zapamtiti kao ${pend.label}, ${pend.date}, u ${pend.time}? Reci da ili promijeni.`,()=>{if(st==='CONFIRM')av('idle');});
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){unsup.style.display='block';unsup.textContent='Koristi Chrome.';micB.disabled=true;micB.style.opacity='0.3';}

function mkRec(){
  if(!SR)return null;
  const r=new SR();r.lang=lang;r.continuous=false;r.interimResults=false;r.maxAlternatives=1;
  r.onresult=e=>{if(e.results.length>0&&e.results[0].isFinal){const t=e.results[0][0].transcript.trim();if(t.length>0){addUsr(t);handle(t);resetIdle();}}};
  r.onerror=e=>{if(e.error==='not-allowed'){micSt.textContent='🔒';listening=false;micB.classList.remove('on');}};
  r.onend=()=>{if(listening){clearTimeout(restartT);restartT=setTimeout(()=>{if(listening)try{mkRec()?.start();}catch(e){listening=false;micB.classList.remove('on');micSt.textContent='tap';micSt.classList.remove('on');}},400);}else{micB.classList.remove('on');micSt.textContent='tap';micSt.classList.remove('on');}};
  return r;
}

function startListen(){if(!SR)return;listening=true;micB.classList.add('on');micSt.textContent='...';micSt.classList.add('on');av('listening');try{mkRec()?.start();}catch(e){listening=false;micB.classList.remove('on');}}
function stopListen(){listening=false;clearTimeout(restartT);micB.classList.remove('on');micSt.textContent='tap';micSt.classList.remove('on');if(st==='IDLE')av('idle');}
micB.addEventListener('click',()=>{listening?stopListen():startListen();});
