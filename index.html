<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>Asistent</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e0e8;
    --text-dim: #6b6f80;
    --accent: #4ecdc4;
    --accent-glow: rgba(78, 205, 196, 0.15);
    --red: #ff6b6b;
    --red-glow: rgba(255, 107, 107, 0.25);
    --gold: #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1.2rem;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  .container {
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  /* Header */
  .step-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    color: var(--bg);
    background: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 0.2rem;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 2rem;
  }

  /* Mic button — big and tappable */
  .mic-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .mic-wrapper {
    position: relative;
    display: inline-block;
  }

  .mic-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.3s;
    pointer-events: none;
  }

  .mic-ring-outer {
    position: absolute;
    inset: -22px;
    border-radius: 50%;
    border: 1px solid transparent;
    pointer-events: none;
  }

  .mic-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
    z-index: 1;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  .mic-btn:active {
    transform: scale(0.95);
  }

  .mic-btn svg {
    width: 44px;
    height: 44px;
    fill: currentColor;
    transition: fill 0.3s;
  }

  /* Listening state */
  .mic-btn.listening {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 40px var(--red-glow);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .mic-btn.listening ~ .mic-ring {
    border-color: rgba(255, 107, 107, 0.4);
    animation: ring1 1.5s ease-in-out infinite;
  }

  .mic-btn.listening ~ .mic-ring-outer {
    border-color: rgba(255, 107, 107, 0.15);
    animation: ring2 1.5s ease-in-out infinite 0.2s;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  @keyframes ring1 {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.1); opacity: 1; }
  }
  @keyframes ring2 {
    0%, 100% { transform: scale(1); opacity: 0.2; }
    50% { transform: scale(1.15); opacity: 0.5; }
  }

  /* Status */
  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 1.2rem;
    min-height: 1.2em;
    text-align: center;
    transition: color 0.3s;
  }
  .status.active { color: var(--red); }
  .status.error { color: var(--red); }

  /* Transcript */
  .transcript-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1.3rem;
    min-height: 100px;
    text-align: left;
    margin-bottom: 1rem;
  }

  .transcript-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.6rem;
  }

  .transcript-text {
    font-size: 1.15rem;
    line-height: 1.6;
    color: var(--text);
    font-weight: 300;
    word-break: break-word;
  }
  .transcript-text.interim {
    color: var(--text-dim);
    font-style: italic;
  }
  .transcript-text.empty {
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.9rem;
  }

  /* Language toggle */
  .lang-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    background: var(--surface);
    border-radius: 8px;
    padding: 0.25rem;
    border: 1px solid var(--border);
  }

  .lang-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.4rem 0.8rem;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .lang-btn.active {
    background: var(--accent);
    color: var(--bg);
  }

  /* Log */
  .log {
    width: 100%;
    flex: 1;
    overflow-y: auto;
  }

  .log-entry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
  }

  .log-entry .time {
    color: var(--accent);
    flex-shrink: 0;
    font-size: 0.6rem;
  }

  .log-entry .msg {
    color: var(--text);
    line-height: 1.4;
  }

  /* Confidence meter */
  .confidence {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
  }
  .confidence-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 0.3rem;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  /* Unsupported */
  .unsupported {
    background: var(--red-glow);
    border: 1px solid var(--red);
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.85rem;
    color: var(--red);
    margin-bottom: 1.5rem;
    width: 100%;
    text-align: center;
    line-height: 1.5;
  }

  /* Clear button */
  .clear-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    margin-top: 0.8rem;
    letter-spacing: 0.05em;
  }
  .clear-btn:active {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="container">
  <div class="step-badge">Step 1 / 5 — Ears</div>
  <h1>ASISTENT</h1>
  <div class="subtitle">voice test · bosanski</div>

  <div id="unsupported" class="unsupported" style="display:none;"></div>

  <!-- Language selector -->
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="hr-HR">Bosanski</button>
    <button class="lang-btn" data-lang="sr-RS">Srpski</button>
    <button class="lang-btn" data-lang="en-US">English</button>
  </div>

  <!-- Mic -->
  <div class="mic-area">
    <div class="mic-wrapper">
      <div class="mic-ring"></div>
      <div class="mic-ring-outer"></div>
      <button class="mic-btn" id="micBtn" aria-label="Mikrofon">
        <svg viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>
    <div class="status" id="status">tap mikrofon za početak</div>
  </div>

  <!-- Transcript -->
  <div class="transcript-box">
    <div class="transcript-label">transcript</div>
    <div class="transcript-text empty" id="transcript">čekam da nešto kažeš...</div>
    <div class="confidence" id="confidenceArea" style="display:none;">
      pouzdanost: <span id="confidenceVal">0%</span>
      <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill"></div></div>
    </div>
  </div>

  <!-- Log -->
  <div class="log" id="log"></div>

  <button class="clear-btn" id="clearBtn">očisti log</button>
</div>

<script>
  const micBtn = document.getElementById('micBtn');
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');
  const logEl = document.getElementById('log');
  const unsupportedEl = document.getElementById('unsupported');
  const confidenceArea = document.getElementById('confidenceArea');
  const confidenceVal = document.getElementById('confidenceVal');
  const confidenceFill = document.getElementById('confidenceFill');
  const clearBtn = document.getElementById('clearBtn');
  const langBtns = document.querySelectorAll('.lang-btn');

  let currentLang = 'hr-HR';
  let recognition = null;
  let isListening = false;

  // Check support
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    unsupportedEl.style.display = 'block';
    unsupportedEl.textContent = 'Ovaj browser ne podržava Speech Recognition. Otvori u Chrome-u.';
    micBtn.disabled = true;
    micBtn.style.opacity = '0.3';
    statusEl.textContent = 'nije podržano';
    statusEl.classList.add('error');
  }

  // Check HTTPS
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    unsupportedEl.style.display = 'block';
    unsupportedEl.innerHTML = '⚠️ Mikrofon zahtijeva HTTPS.<br>Ova stranica mora biti hostana na HTTPS-u (npr. GitHub Pages).';
  }

  // Language toggle
  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (isListening) stopListening();
      langBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      addLog(`🌐 Jezik: ${btn.textContent} (${currentLang})`);
    });
  });

  function addLog(msg) {
    const now = new Date();
    const time = now.toLocaleTimeString('hr-HR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="time">${time}</span><span class="msg">${msg}</span>`;
    logEl.prepend(entry);
    while (logEl.children.length > 12) {
      logEl.removeChild(logEl.lastChild);
    }
  }

  function startListening() {
    if (!SpeechRecognition) return;

    recognition = new SpeechRecognition();
    recognition.lang = currentLang;
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add('listening');
      statusEl.textContent = 'slušam...';
      statusEl.classList.add('active');
      addLog('🎙️ Mikrofon aktivan');
    };

    recognition.onresult = (event) => {
      let interim = '';
      let final = '';
      let lastConfidence = 0;

      for (let i = 0; i < event.results.length; i++) {
        const result = event.results[i];
        if (result.isFinal) {
          final += result[0].transcript;
          lastConfidence = result[0].confidence;
        } else {
          interim += result[0].transcript;
        }
      }

      if (final) {
        transcriptEl.textContent = final;
        transcriptEl.className = 'transcript-text';

        // Show confidence
        const pct = Math.round(lastConfidence * 100);
        confidenceArea.style.display = 'block';
        confidenceVal.textContent = pct + '%';
        confidenceFill.style.width = pct + '%';
        confidenceFill.style.background = pct > 80 ? 'var(--accent)' : pct > 50 ? 'var(--gold)' : 'var(--red)';

        addLog(`✅ [${pct}%] "${final}"`);
      } else if (interim) {
        transcriptEl.textContent = interim;
        transcriptEl.className = 'transcript-text interim';
        confidenceArea.style.display = 'none';
      }
    };

    recognition.onerror = (event) => {
      addLog(`❌ Greška: ${event.error}`);
      if (event.error === 'not-allowed') {
        statusEl.textContent = 'mikrofon blokiran — provjeri dozvole';
        statusEl.classList.add('error');
      } else if (event.error === 'no-speech') {
        addLog('🤫 Nema govora — pokušaj ponovo');
      }
    };

    recognition.onend = () => {
      // Auto-restart if still supposed to be listening
      if (isListening) {
        try {
          recognition.start();
        } catch(e) {
          isListening = false;
          micBtn.classList.remove('listening');
          statusEl.textContent = 'tap mikrofon za početak';
          statusEl.classList.remove('active');
          addLog('⏹️ Mikrofon ugašen');
        }
        return;
      }
      micBtn.classList.remove('listening');
      statusEl.textContent = 'tap mikrofon za početak';
      statusEl.classList.remove('active');
      addLog('⏹️ Mikrofon ugašen');
    };

    try {
      recognition.start();
    } catch(e) {
      addLog(`❌ Ne mogu pokrenuti: ${e.message}`);
    }
  }

  function stopListening() {
    isListening = false;
    if (recognition) {
      recognition.stop();
      recognition = null;
    }
  }

  micBtn.addEventListener('click', () => {
    if (isListening) {
      stopListening();
    } else {
      startListening();
    }
  });

  clearBtn.addEventListener('click', () => {
    logEl.innerHTML = '';
    transcriptEl.textContent = 'čekam da nešto kažeš...';
    transcriptEl.className = 'transcript-text empty';
    confidenceArea.style.display = 'none';
  });

  // Prevent zoom on double-tap
  document.addEventListener('dblclick', (e) => e.preventDefault());
</script>

</body>
</html>
