<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>Asistent</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e0e8;
    --text-dim: #6b6f80;
    --accent: #4ecdc4;
    --accent-glow: rgba(78, 205, 196, 0.15);
    --red: #ff6b6b;
    --red-glow: rgba(255, 107, 107, 0.25);
    --gold: #f0c040;
    --green: #6bcf7f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1.2rem;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  .container {
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .header-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.5rem;
  }

  .step-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    color: var(--bg);
    background: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .settings-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .settings-btn:active, .settings-btn.active { border-color: var(--accent); color: var(--accent); }
  .settings-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .api-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red);
    position: absolute; top: -1px; right: -1px;
  }
  .api-dot.connected { background: var(--green); }

  .title-area { text-align: center; width: 100%; margin-bottom: 1.5rem; }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3rem; font-weight: 600;
    color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.2rem;
  }

  .subtitle {
    font-size: 0.75rem; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Settings panel */
  .settings-panel {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 1.2rem; margin-bottom: 1.5rem; display: none;
  }
  .settings-panel.open { display: block; }

  .settings-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;
  }

  .field-group { margin-bottom: 1rem; }

  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem;
  }

  .field-input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0.7rem 0.8rem; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
    outline: none; transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--text-dim); }

  .field-hint { font-size: 0.6rem; color: var(--text-dim); margin-top: 0.3rem; line-height: 1.4; }

  .save-key-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: var(--bg); background: var(--accent);
    border: none; border-radius: 6px; padding: 0.5rem 1.2rem;
    cursor: pointer; letter-spacing: 0.05em;
  }
  .save-key-btn:active { opacity: 0.8; }

  .key-status { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; margin-top: 0.5rem; min-height: 1em; }
  .key-status.ok { color: var(--green); }
  .key-status.err { color: var(--red); }

  /* Mic */
  .mic-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; }
  .mic-wrapper { position: relative; display: inline-block; }

  .mic-ring {
    position: absolute; inset: -10px; border-radius: 50%;
    border: 2px solid transparent; transition: all 0.3s; pointer-events: none;
  }
  .mic-ring-outer {
    position: absolute; inset: -22px; border-radius: 50%;
    border: 1px solid transparent; pointer-events: none;
  }

  .mic-btn {
    width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; position: relative; z-index: 1;
    -webkit-user-select: none; user-select: none; touch-action: manipulation;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn svg { width: 44px; height: 44px; fill: currentColor; }

  .mic-btn.listening {
    border-color: var(--red); color: var(--red);
    box-shadow: 0 0 40px var(--red-glow);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .mic-btn.listening ~ .mic-ring {
    border-color: rgba(255, 107, 107, 0.4);
    animation: ring1 1.5s ease-in-out infinite;
  }
  .mic-btn.listening ~ .mic-ring-outer {
    border-color: rgba(255, 107, 107, 0.15);
    animation: ring2 1.5s ease-in-out infinite 0.2s;
  }

  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  @keyframes ring1 { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.1);opacity:1} }
  @keyframes ring2 { 0%,100%{transform:scale(1);opacity:.2} 50%{transform:scale(1.15);opacity:.5} }

  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--text-dim);
    margin-top: 1.2rem; min-height: 1.2em;
    text-align: center; transition: color 0.3s;
  }
  .status.active { color: var(--red); }
  .status.error { color: var(--red); }

  /* Boxes */
  .info-box {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 1.2rem 1.3rem; min-height: 80px;
    text-align: left; margin-bottom: 0.8rem; position: relative; overflow: hidden;
  }

  .box-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.6rem;
  }

  .transcript-text {
    font-size: 1.1rem; line-height: 1.6; color: var(--text); font-weight: 300; word-break: break-word;
  }
  .transcript-text.interim { color: var(--text-dim); font-style: italic; }
  .transcript-text.empty { color: var(--text-dim); font-style: italic; font-size: 0.9rem; }

  .confidence { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-dim); margin-top: 0.5rem; }
  .confidence-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 0.3rem; overflow: hidden; }
  .confidence-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

  /* Brain states */
  .info-box.thinking { border-color: var(--gold); }
  .info-box.thinking::after {
    content: ''; position: absolute; bottom: 0; left: 0; height: 2px;
    background: var(--gold); animation: brainload 1.5s ease-in-out infinite;
  }
  @keyframes brainload { 0%{width:0;left:0} 50%{width:60%;left:20%} 100%{width:0;left:100%} }

  .brain-empty { color: var(--text-dim); font-style: italic; font-size: 0.85rem; }

  .parsed-field { display: flex; gap: 0.5rem; margin-bottom: 0.4rem; align-items: baseline; }
  .parsed-key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.08em;
    flex-shrink: 0; min-width: 60px;
  }
  .parsed-val { font-size: 0.95rem; color: var(--text); }
  .parsed-error { color: var(--red); font-size: 0.8rem; }

  .brain-tag {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; padding: 0.15rem 0.4rem;
    border-radius: 3px; letter-spacing: 0.05em; margin-left: 0.5rem;
  }
  .brain-tag.reminder { background: rgba(78,205,196,0.15); color: var(--accent); }
  .brain-tag.question { background: rgba(240,192,64,0.15); color: var(--gold); }
  .brain-tag.other { background: rgba(107,111,128,0.15); color: var(--text-dim); }

  /* Lang toggle */
  .lang-toggle {
    display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
    background: var(--surface); border-radius: 8px;
    padding: 0.25rem; border: 1px solid var(--border);
  }
  .lang-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    padding: 0.4rem 0.8rem; border: none; background: transparent;
    color: var(--text-dim); border-radius: 6px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
  }
  .lang-btn.active { background: var(--accent); color: var(--bg); }

  /* Log */
  .log { width: 100%; flex: 1; overflow-y: auto; }
  .log-entry {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    color: var(--text-dim); padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 0.6rem; align-items: flex-start;
  }
  .log-entry .time { color: var(--accent); flex-shrink: 0; font-size: 0.6rem; }
  .log-entry .msg { color: var(--text); line-height: 1.4; }

  .unsupported {
    background: var(--red-glow); border: 1px solid var(--red);
    border-radius: 10px; padding: 1rem; font-size: 0.85rem;
    color: var(--red); margin-bottom: 1.5rem; width: 100%;
    text-align: center; line-height: 1.5;
  }

  .clear-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    color: var(--text-dim); background: none;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.4rem 0.8rem; cursor: pointer; margin-top: 0.8rem;
  }
  .clear-btn:active { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="container">
  <div class="header-row">
    <div class="step-badge">Step 2 / 5 — Ears + Brain</div>
    <button class="settings-btn" id="settingsBtn">
      <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      <div class="api-dot" id="apiDot"></div>
    </button>
  </div>

  <div class="title-area">
    <h1>ASISTENT</h1>
    <div class="subtitle">voice + brain · bosanski</div>
  </div>

  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">Postavke</div>
    <div class="field-group">
      <div class="field-label">Anthropic API Key</div>
      <input type="password" class="field-input" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
      <div class="field-hint">Ključ se čuva samo na tvom uređaju. Ne šalje se nigdje osim Anthropic API-ju.</div>
    </div>
    <button class="save-key-btn" id="saveKeyBtn">Spremi ključ</button>
    <div class="key-status" id="keyStatus"></div>
  </div>

  <div id="unsupported" class="unsupported" style="display:none;"></div>

  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="hr-HR">Bosanski</button>
    <button class="lang-btn" data-lang="sr-RS">Srpski</button>
    <button class="lang-btn" data-lang="en-US">English</button>
  </div>

  <div class="mic-area">
    <div class="mic-wrapper">
      <div class="mic-ring"></div>
      <div class="mic-ring-outer"></div>
      <button class="mic-btn" id="micBtn" aria-label="Mikrofon">
        <svg viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>
    <div class="status" id="status">tap mikrofon za početak</div>
  </div>

  <!-- Transcript -->
  <div class="info-box">
    <div class="box-label">transcript</div>
    <div class="transcript-text empty" id="transcript">čekam da nešto kažeš...</div>
    <div class="confidence" id="confidenceArea" style="display:none;">
      pouzdanost: <span id="confidenceVal">0%</span>
      <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill"></div></div>
    </div>
  </div>

  <!-- Brain -->
  <div class="info-box" id="brainBox">
    <div class="box-label">brain <span class="brain-tag other" id="brainTag" style="display:none;"></span></div>
    <div id="brainContent"><div class="brain-empty">čekam govornu komandu...</div></div>
  </div>

  <div class="log" id="log"></div>
  <button class="clear-btn" id="clearBtn">očisti log</button>
</div>

<script>
  // ---- DOM ----
  const $ = id => document.getElementById(id);
  const micBtn = $('micBtn'), statusEl = $('status'), transcriptEl = $('transcript');
  const logEl = $('log'), unsupportedEl = $('unsupported');
  const confidenceArea = $('confidenceArea'), confidenceVal = $('confidenceVal'), confidenceFill = $('confidenceFill');
  const clearBtn = $('clearBtn'), langBtns = document.querySelectorAll('.lang-btn');
  const settingsBtn = $('settingsBtn'), settingsPanel = $('settingsPanel');
  const apiKeyInput = $('apiKeyInput'), saveKeyBtn = $('saveKeyBtn'), keyStatus = $('keyStatus');
  const apiDot = $('apiDot'), brainBox = $('brainBox');
  const brainContent = $('brainContent'), brainTag = $('brainTag');

  // ---- State ----
  let currentLang = 'hr-HR';
  let recognition = null;
  let isListening = false;
  let lastFinalIndex = 0;
  let apiKey = localStorage.getItem('asistent_api_key') || '';
  let brainBusy = false;

  // ---- Helpers ----
  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function addLog(msg) {
    const t = new Date().toLocaleTimeString('hr-HR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const e = document.createElement('div');
    e.className = 'log-entry';
    e.innerHTML = `<span class="time">${t}</span><span class="msg">${msg}</span>`;
    logEl.prepend(e);
    while (logEl.children.length > 15) logEl.removeChild(logEl.lastChild);
  }

  // ---- API Key ----
  function updateDot() { apiDot.className = apiKey ? 'api-dot connected' : 'api-dot'; }
  updateDot();
  if (apiKey) apiKeyInput.value = apiKey;

  settingsBtn.addEventListener('click', () => {
    settingsPanel.classList.toggle('open');
    settingsBtn.classList.toggle('active');
  });

  saveKeyBtn.addEventListener('click', () => {
    const k = apiKeyInput.value.trim();
    if (!k) { keyStatus.textContent = '❌ Unesi API ključ'; keyStatus.className = 'key-status err'; return; }
    apiKey = k;
    localStorage.setItem('asistent_api_key', k);
    updateDot();
    keyStatus.textContent = '✅ Ključ spremljen';
    keyStatus.className = 'key-status ok';
    addLog('🔑 API ključ spremljen');
    setTimeout(() => { settingsPanel.classList.remove('open'); settingsBtn.classList.remove('active'); }, 800);
  });

  // ---- Brain ----
  async function sendToBrain(text) {
    if (!apiKey) {
      brainContent.innerHTML = '<div class="parsed-error">Nema API ključa — otvori ⚙️ postavke</div>';
      addLog('❌ Brain: nema API ključa');
      return;
    }
    if (brainBusy) return;
    brainBusy = true;

    brainBox.classList.add('thinking');
    brainContent.innerHTML = '<div class="brain-empty">razmišljam...</div>';
    brainTag.style.display = 'none';
    addLog(`🧠 Brain: "${text}"`);

    const now = new Date();
    const dateStr = now.toISOString().split('T')[0];
    const days = ['nedjelja','ponedjeljak','utorak','srijeda','četvrtak','petak','subota'];
    const dayName = days[now.getDay()];
    const timeStr = now.toLocaleTimeString('hr-HR', { hour:'2-digit', minute:'2-digit' });

    const systemPrompt = `Ti si parser govornih komandi za AI asistenta. Korisnik govori bosanski/hrvatski/srpski.

Danas je ${dayName}, ${dateStr}. Trenutno vrijeme: ${timeStr}.

Tvoj jedini zadatak: analiziraj korisnikov unos i vrati JSON odgovor.

Ako je komanda PODSJETNIK (reminder), vrati:
{"action":"reminder","message":"Čitljiv opis podsjetnika","date":"YYYY-MM-DD","time":"HH:MM","raw_input":"originalni tekst"}

Ako je komanda PITANJE ili RAZGOVOR, vrati:
{"action":"question","message":"Kratak odgovor","raw_input":"originalni tekst"}

Ako ne razumiješ, vrati:
{"action":"unclear","message":"Nisam razumio. Pokušaj ponovo.","raw_input":"originalni tekst"}

Pravila za datume:
- "sutra" = sutrašnji datum
- "prekosutra" = za dva dana
- "u petak" = sljedeći petak (ako je danas taj dan, onda sljedeći sedmici)
- "za sat vremena" / "za pola sata" = izračunaj od trenutnog vremena
- "navečer" = 20:00, "ujutro" = 08:00, "popodne" = 14:00

Odgovori SAMO sa JSON objektom. Bez dodatnog teksta.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          system: systemPrompt,
          messages: [{ role: 'user', content: text }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(`API ${res.status}: ${err?.error?.message || res.statusText}`);
      }

      const data = await res.json();
      const raw = data.content?.[0]?.text || '';

      let parsed;
      try {
        parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
      } catch { throw new Error('Brain vratio neispravan JSON'); }

      displayResult(parsed);
      addLog(`✅ Brain: ${parsed.action} — "${parsed.message}"`);

    } catch (err) {
      brainContent.innerHTML = `<div class="parsed-error">❌ ${esc(err.message)}</div>`;
      addLog(`❌ Brain: ${err.message}`);
    } finally {
      brainBox.classList.remove('thinking');
      brainBusy = false;
    }
  }

  function displayResult(p) {
    brainTag.style.display = 'inline-block';
    let h = '';

    if (p.action === 'reminder') {
      brainTag.textContent = 'PODSJETNIK'; brainTag.className = 'brain-tag reminder';
      h += `<div class="parsed-field"><span class="parsed-key">Šta:</span><span class="parsed-val">${esc(p.message)}</span></div>`;
      if (p.date) h += `<div class="parsed-field"><span class="parsed-key">Datum:</span><span class="parsed-val">${esc(p.date)}</span></div>`;
      if (p.time) h += `<div class="parsed-field"><span class="parsed-key">Vrijeme:</span><span class="parsed-val">${esc(p.time)}</span></div>`;
    } else if (p.action === 'question') {
      brainTag.textContent = 'PITANJE'; brainTag.className = 'brain-tag question';
      h += `<div class="parsed-val">${esc(p.message)}</div>`;
    } else {
      brainTag.textContent = 'NEJASNO'; brainTag.className = 'brain-tag other';
      h += `<div class="parsed-val">${esc(p.message)}</div>`;
    }

    brainContent.innerHTML = h;
  }

  // ---- Speech ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    unsupportedEl.style.display = 'block';
    unsupportedEl.textContent = 'Speech Recognition nije podržan. Koristi Chrome.';
    micBtn.disabled = true; micBtn.style.opacity = '0.3';
    statusEl.textContent = 'nije podržano'; statusEl.classList.add('error');
  }

  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    unsupportedEl.style.display = 'block';
    unsupportedEl.innerHTML = '⚠️ Mikrofon zahtijeva HTTPS.';
  }

  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (isListening) stopListening();
      langBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      addLog(`🌐 Jezik: ${btn.textContent} (${currentLang})`);
    });
  });

  function startListening() {
    if (!SR) return;
    recognition = new SR();
    recognition.lang = currentLang;
    recognition.continuous = true;
    recognition.interimResults = true;
    lastFinalIndex = 0;

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add('listening');
      statusEl.textContent = 'slušam...'; statusEl.classList.add('active');
      addLog('🎙️ Mikrofon aktivan');
    };

    recognition.onresult = (event) => {
      let interim = '', latestFinal = '', lastConf = 0;

      for (let i = lastFinalIndex; i < event.results.length; i++) {
        const r = event.results[i];
        if (r.isFinal) {
          latestFinal += r[0].transcript;
          lastConf = r[0].confidence;
          lastFinalIndex = i + 1;
        } else {
          interim += r[0].transcript;
        }
      }

      if (latestFinal) {
        transcriptEl.textContent = latestFinal;
        transcriptEl.className = 'transcript-text';
        const pct = Math.round(lastConf * 100);
        confidenceArea.style.display = 'block';
        confidenceVal.textContent = pct + '%';
        confidenceFill.style.width = pct + '%';
        confidenceFill.style.background = pct > 80 ? 'var(--accent)' : pct > 50 ? 'var(--gold)' : 'var(--red)';
        addLog(`✅ [${pct}%] "${latestFinal}"`);

        // Send to brain automatically
        sendToBrain(latestFinal.trim());

      } else if (interim) {
        transcriptEl.textContent = interim;
        transcriptEl.className = 'transcript-text interim';
        confidenceArea.style.display = 'none';
      }
    };

    recognition.onerror = (event) => {
      addLog(`❌ Greška: ${event.error}`);
      if (event.error === 'not-allowed') {
        statusEl.textContent = 'mikrofon blokiran'; statusEl.classList.add('error');
      }
    };

    recognition.onend = () => {
      if (isListening) {
        try { lastFinalIndex = 0; recognition.start(); } catch(e) {
          isListening = false; micBtn.classList.remove('listening');
          statusEl.textContent = 'tap mikrofon za početak'; statusEl.classList.remove('active');
        }
        return;
      }
      micBtn.classList.remove('listening');
      statusEl.textContent = 'tap mikrofon za početak'; statusEl.classList.remove('active');
      addLog('⏹️ Stop');
    };

    try { recognition.start(); } catch(e) { addLog(`❌ ${e.message}`); }
  }

  function stopListening() {
    isListening = false;
    if (recognition) { recognition.stop(); recognition = null; }
  }

  micBtn.addEventListener('click', () => { isListening ? stopListening() : startListening(); });

  clearBtn.addEventListener('click', () => {
    logEl.innerHTML = '';
    transcriptEl.textContent = 'čekam da nešto kažeš...';
    transcriptEl.className = 'transcript-text empty';
    confidenceArea.style.display = 'none';
    brainContent.innerHTML = '<div class="brain-empty">čekam govornu komandu...</div>';
    brainTag.style.display = 'none';
  });

  document.addEventListener('dblclick', e => e.preventDefault());
</script>

</body>
</html>
