<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>Asistent</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e0e0e8;--text-dim:#6b6f80;
    --accent:#4ecdc4;--red:#ff6b6b;--red-glow:rgba(255,107,107,0.25);--gold:#f0c040;--green:#6bcf7f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0.8rem 1rem 1.2rem;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
  .container{max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;flex:1}

  /* Header */
  .header-row{width:100%;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.2rem}
  .header-left{display:flex;flex-direction:column;gap:0.1rem}
  .step-badge{font-family:'JetBrains Mono',monospace;font-size:0.45rem;color:var(--bg);background:var(--accent);padding:0.12rem 0.4rem;border-radius:3px;letter-spacing:0.1em;text-transform:uppercase;align-self:flex-start}
  .header-title{font-family:'JetBrains Mono',monospace;font-size:0.9rem;font-weight:600;color:var(--accent);letter-spacing:0.1em}
  .header-sub{font-size:0.45rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem}
  .header-icons{display:flex;gap:0.3rem}
  .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
  .icon-btn:active{border-color:var(--accent);color:var(--accent)}
  .icon-btn svg{width:14px;height:14px;fill:currentColor}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--red);position:absolute;top:-1px;right:-1px}
  .dot.on{background:var(--green)}

  /* Lang toggle - compact vertical */
  .lang-toggle{display:flex;gap:0.2rem;background:var(--surface);border-radius:5px;padding:0.15rem;border:1px solid var(--border)}
  .lang-btn{font-family:'JetBrains Mono',monospace;font-size:0.5rem;padding:0.2rem 0.4rem;border:none;background:transparent;color:var(--text-dim);border-radius:4px;cursor:pointer}
  .lang-btn.active{background:var(--accent);color:var(--bg)}

  /* Settings */
  .settings-panel{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:0.5rem;display:none}
  .settings-panel.open{display:block}
  .settings-title{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.8rem}
  .field-group{margin-bottom:0.8rem}
  .field-label{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem}
  .field-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.6rem;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.7rem;outline:none}
  .field-input:focus{border-color:var(--accent)}
  .field-input::placeholder{color:var(--text-dim)}
  .save-key-btn{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--bg);background:var(--accent);border:none;border-radius:5px;padding:0.4rem 1rem;cursor:pointer}
  .key-status{font-family:'JetBrains Mono',monospace;font-size:0.55rem;margin-top:0.3rem}
  .key-status.ok{color:var(--green)}.key-status.err{color:var(--red)}

  /* Avatar */
  .avatar-area{width:100%;position:relative;margin-bottom:0.2rem}
  #avatarCanvas{width:100%;height:420px;display:block;border-radius:10px}
  .avatar-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text-dim)}
  .avatar-state{position:absolute;bottom:4px;right:8px;font-family:'JetBrains Mono',monospace;font-size:0.45rem;color:var(--text-dim);background:rgba(15,17,23,0.7);padding:0.1rem 0.3rem;border-radius:3px;letter-spacing:0.08em;text-transform:uppercase}

  /* Mic floating on hat */
  .mic-float{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10}
  .mic-btn{width:60px;height:60px;border-radius:50%;border:2px solid var(--border);background:rgba(26,29,39,0.85);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;touch-action:manipulation;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
  .mic-btn:active{transform:scale(0.93)}
  .mic-btn svg{width:28px;height:28px;fill:currentColor}
  .mic-btn.listening{border-color:var(--red);color:var(--red);box-shadow:0 0 25px var(--red-glow);animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .mic-status{position:absolute;top:68px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--text-dim);white-space:nowrap;background:rgba(15,17,23,0.7);padding:0.1rem 0.4rem;border-radius:3px}
  .mic-status.active{color:var(--red)}

  /* Convo */
  .convo-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0.5rem 0.8rem;min-height:60px;max-height:120px;text-align:left;margin-bottom:0.5rem;overflow-y:auto;position:relative}
  .convo-box.thinking{border-color:var(--gold)}
  .convo-box.thinking::after{content:'';position:absolute;bottom:0;left:0;height:2px;background:var(--gold);animation:bl 1.5s ease-in-out infinite}
  @keyframes bl{0%{width:0;left:0}50%{width:60%;left:20%}100%{width:0;left:100%}}
  .convo-label{font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem}
  .msg{margin-bottom:0.5rem;padding:0.45rem 0.65rem;border-radius:9px;font-size:0.8rem;line-height:1.4;max-width:92%;word-break:break-word}
  .msg.user{background:rgba(78,205,196,0.1);border:1px solid rgba(78,205,196,0.2);margin-left:auto;color:var(--accent);text-align:right}
  .msg.bot{background:rgba(107,111,128,0.1);border:1px solid rgba(107,111,128,0.15);color:var(--text)}
  .msg.bot.ask{background:rgba(240,192,64,0.08);border:1px solid rgba(240,192,64,0.2);color:var(--gold)}
  .msg.bot.confirm{background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.2)}
  .msg.bot.saved{background:rgba(107,207,127,0.1);border:1px solid rgba(107,207,127,0.25);color:var(--green)}
  .msg.bot.error{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);color:var(--red)}
  .msg.bot.joke{background:rgba(240,192,64,0.06);border:1px solid rgba(240,192,64,0.15);color:var(--gold);font-style:italic}
  .confirm-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;display:block;margin-top:0.2rem}
  .confirm-detail{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--text-dim);display:block;margin-top:0.1rem}
  .hint-text{font-size:0.6rem;color:var(--text-dim);font-style:italic;margin-top:0.2rem}

  .log{width:100%;flex:1;overflow-y:auto}
  .log-entry{font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--text-dim);padding:0.25rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.4rem}
  .log-entry .time{color:var(--accent);flex-shrink:0}
  .log-entry .lmsg{color:var(--text);line-height:1.3}
  .unsupported{background:rgba(255,107,107,0.1);border:1px solid var(--red);border-radius:8px;padding:0.7rem;font-size:0.75rem;color:var(--red);margin-bottom:0.5rem;width:100%;text-align:center}
  .btn-row{display:flex;gap:0.4rem;margin-top:0.4rem;width:100%}
  .clear-btn,.cancel-btn{font-family:'JetBrains Mono',monospace;font-size:0.55rem;background:none;border-radius:5px;padding:0.3rem 0.6rem;cursor:pointer}
  .clear-btn{color:var(--text-dim);border:1px solid var(--border)}
  .cancel-btn{color:var(--red);border:1px solid rgba(255,107,107,0.3)}
</style>
</head>

<!-- Avatar module -->
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

const canvas = document.getElementById('avatarCanvas');
const container = document.getElementById('avatarArea');
const loadingEl = document.getElementById('avatarLoading');
const stateLabel = document.getElementById('avatarStateLabel');

const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(22, 1, 0.1, 20);
camera.position.set(0, 0.7, 4.0);
camera.lookAt(0, 0.7, 0);

function resize(){
  const w=container.clientWidth, h=420;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}

scene.add(new THREE.AmbientLight(0xccccdd, 1.0));
const key=new THREE.DirectionalLight(0xffeedd,1.2);key.position.set(1,2,2);scene.add(key);
const fill=new THREE.DirectionalLight(0x4ecdc4,0.3);fill.position.set(-1,1,1);scene.add(fill);
const rim=new THREE.DirectionalLight(0x4ecdc4,0.4);rim.position.set(0,1,-2);scene.add(rim);

const loader = new GLTFLoader();
loader.register(p => new VRMLoaderPlugin(p));

let vrm=null;
let avatarState='idle';
const clock=new THREE.Clock();
let blinkTimer=0, nextBlink=2+Math.random()*3;
let mouthPhase=0, breathPhase=0, posePhase=0;
let poseBlend=0; // 0=bounce, 1=leanback for speaking cycle

// Bone pose targets (we lerp toward these)
const POSES = {
  idle: { // cross arms
    spine: [0,0,0],
    rightUpperArm: [0.5, 0, -0.8],
    rightLowerArm: [0, -1.4, 0],
    leftUpperArm: [0.5, 0, 0.8],
    leftLowerArm: [0, 1.4, 0],
    head: [0,0,0]
  },
  bounce: {
    spine: [0.08,0,0],
    rightUpperArm: [0.3, 0, -1.2],
    rightLowerArm: [0, -0.3, 0],
    leftUpperArm: [0.3, 0, 1.2],
    leftLowerArm: [0, 0.3, 0],
    head: [0,0,0]
  },
  leanback: {
    spine: [-0.12,0,0],
    rightUpperArm: [-0.3, 0, -1.5],
    rightLowerArm: [0, -0.2, 0],
    leftUpperArm: [0.6, 0, 0.5],
    leftLowerArm: [0, 1.0, 0],
    head: [-0.1,0,0]
  },
  point: {
    spine: [0.05,0,0],
    rightUpperArm: [0.8, 0, -0.3],
    rightLowerArm: [0, 0, 0],
    leftUpperArm: [0.2, 0, 0.8],
    leftLowerArm: [0, 1.2, 0],
    head: [0,0,0]
  },
  wave: {
    spine: [0,0,0],
    rightUpperArm: [-0.5, 0, -1.8],
    rightLowerArm: [0, -0.8, 0],
    leftUpperArm: [-0.5, 0, 1.8],
    leftLowerArm: [0, 0.8, 0],
    head: [0,0,0]
  }
};

let currentPoseTargets = POSES.idle;

function getBone(name) {
  if (!vrm?.humanoid) return null;
  return vrm.humanoid.getNormalizedBoneNode(name);
}

function lerpBone(boneName, target, speed, delta) {
  const bone = getBone(boneName);
  if (!bone) return;
  const s = 1 - Math.pow(0.001, delta * speed);
  bone.rotation.x += (target[0] - bone.rotation.x) * s;
  bone.rotation.y += (target[1] - bone.rotation.y) * s;
  bone.rotation.z += (target[2] - bone.rotation.z) * s;
}

function setExpr(name, val) {
  if (!vrm?.expressionManager) return;
  try { vrm.expressionManager.setValue(name, val); } catch(e) {}
}

function resetExpressions() {
  ['happy','angry','sad','surprised','aa','ih','ou','ee','oh','a','i','u','e','o','blink','blinkLeft','blinkRight','lookUp','lookDown','lookLeft','lookRight'].forEach(n=>setExpr(n,0));
}

loader.load('./LilTeddy.vrm',
  (gltf) => {
    vrm = gltf.userData.vrm;
    VRMUtils.removeUnnecessaryJoints(vrm.scene);
    scene.add(vrm.scene);
    vrm.scene.rotation.y = Math.PI;

    // Frame full body — use manual camera position
    loadingEl.style.display = 'none';
    if (vrm.expressionManager) {
      console.log('Expressions:', vrm.expressionManager.expressions.map(e=>e.expressionName));
    }
    // Log available bones
    if (vrm.humanoid) {
      const boneNames = [];
      for (const [name] of vrm.humanoid.humanBones) boneNames.push(name);
      console.log('Bones:', boneNames);
    }
    // Trigger greeting after load
    if (window.onTeddyReady) window.onTeddyReady();
  },
  (p) => { if(p.total>0) loadingEl.textContent=`učitavam... ${Math.round(p.loaded/p.total*100)}%`; },
  (e) => { loadingEl.textContent='❌ greška'; loadingEl.style.color='#ff6b6b'; console.error(e); }
);

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();
  if (!vrm) { renderer.render(scene,camera); return; }

  // Breathing
  breathPhase += delta*1.2;
  vrm.scene.position.y = Math.sin(breathPhase)*0.005;

  // Blinking
  blinkTimer+=delta;
  if(blinkTimer>nextBlink){setExpr('blink',1);setExpr('blinkLeft',1);setExpr('blinkRight',1);setTimeout(()=>{setExpr('blink',0);setExpr('blinkLeft',0);setExpr('blinkRight',0);},120);blinkTimer=0;nextBlink=2+Math.random()*4;}

  // Pose animation
  const lerpSpeed = 3;

  switch(avatarState) {
    case 'idle':
      currentPoseTargets = POSES.idle;
      // Subtle sway
      if(getBone('spine')){
        const sway = Math.sin(elapsed*0.6)*0.02;
        currentPoseTargets = {...POSES.idle, spine:[0,sway,0]};
      }
      break;

    case 'listening':
      currentPoseTargets = POSES.idle;
      setExpr('happy', 0.15);
      break;

    case 'thinking':
      currentPoseTargets = POSES.idle;
      setExpr('lookLeft', 0.4);
      setExpr('lookUp', 0.2);
      break;

    case 'speaking':
      // Cycle between bounce and leanback
      posePhase += delta * 0.8;
      poseBlend = (Math.sin(posePhase) + 1) / 2; // 0-1 oscillation
      currentPoseTargets = {};
      for (const bone in POSES.bounce) {
        currentPoseTargets[bone] = POSES.bounce[bone].map((v,i) =>
          v + (POSES.leanback[bone][i] - v) * poseBlend
        );
      }
      // Mouth animation
      mouthPhase += delta*10;
      setExpr('aa', Math.max(0, Math.sin(mouthPhase)*0.5));
      setExpr('a', Math.max(0, Math.sin(mouthPhase)*0.5));
      setExpr('oh', Math.max(0, Math.sin(mouthPhase*0.7+1)*0.3));
      setExpr('o', Math.max(0, Math.sin(mouthPhase*0.7+1)*0.3));
      setExpr('happy', 0.15);
      // Head bob
      if(getBone('head')){
        const bob = Math.sin(elapsed*3)*0.04;
        currentPoseTargets.head = [bob, Math.sin(elapsed*1.5)*0.03, 0];
      }
      break;

    case 'saved':
      currentPoseTargets = POSES.point;
      setExpr('happy', 0.6);
      break;

    case 'confused':
      currentPoseTargets = POSES.wave;
      // Wave animation
      const waveAngle = Math.sin(elapsed*4)*0.3;
      if(getBone('rightUpperArm')){
        currentPoseTargets = {...POSES.wave,
          rightUpperArm: [-0.5+waveAngle, 0, -1.8],
          leftUpperArm: [-0.5-waveAngle, 0, 1.8]
        };
      }
      setExpr('surprised', 0.3);
      break;
  }

  // Apply pose lerp
  for (const bone in currentPoseTargets) {
    lerpBone(bone, currentPoseTargets[bone], lerpSpeed, delta);
  }

  vrm.update(delta);
  renderer.render(scene, camera);
}

resize();

animate();

window.setAvatarState = function(s) {
  resetExpressions();
  avatarState = s;
  mouthPhase = 0;
  posePhase = 0;
  stateLabel.textContent = s;
};

// ---- TTS with voice picker ----
let ttsVoice = null;
const voiceSelect = $('voiceSelect');

const savedVoiceName = localStorage.getItem('asistent_voice') || '';

function populateVoices() {
  const voices = speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';

  // Prioritize HR/SR/BS voices at top, then all others
  const balkanVoices = voices.filter(v => /^(hr|sr|bs)/i.test(v.lang));
  const otherVoices = voices.filter(v => !/^(hr|sr|bs)/i.test(v.lang));

  const addOption = (v, group) => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    if (group) opt.textContent = `★ ${opt.textContent}`;
    voiceSelect.appendChild(opt);
  };

  balkanVoices.forEach(v => addOption(v, true));
  if (balkanVoices.length > 0 && otherVoices.length > 0) {
    const sep = document.createElement('option');
    sep.disabled = true;
    sep.textContent = '───────────';
    voiceSelect.appendChild(sep);
  }
  otherVoices.forEach(v => addOption(v, false));

  // Restore saved selection
  if (savedVoiceName) {
    const match = voices.find(v => v.name === savedVoiceName);
    if (match) { voiceSelect.value = match.name; ttsVoice = match; }
  }

  // Auto-select best balkan voice if no saved choice
  if (!ttsVoice && balkanVoices.length > 0) {
    // Prefer male voices (often contain "Male" or don't contain "Female")
    const male = balkanVoices.find(v => /male/i.test(v.name) && !/female/i.test(v.name));
    ttsVoice = male || balkanVoices[0];
    voiceSelect.value = ttsVoice.name;
  }

  if (ttsVoice) console.log('TTS voice:', ttsVoice.name, ttsVoice.lang);
}

voiceSelect.addEventListener('change', () => {
  const voices = speechSynthesis.getVoices();
  ttsVoice = voices.find(v => v.name === voiceSelect.value) || null;
  localStorage.setItem('asistent_voice', voiceSelect.value);
  addLog('🔊 Glas: ' + (ttsVoice?.name || 'default'));
});

testVoiceBtn.addEventListener('click', () => {

});

speechSynthesis.onvoiceschanged = populateVoices;
setTimeout(populateVoices, 500);
setTimeout(populateVoices, 1500); // retry for slow-loading voices

function speak(text, onEnd) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (ttsVoice) u.voice = ttsVoice;
  u.lang = 'hr-HR';
  u.rate = 0.85;
  u.pitch = 1.15;
  u.onend = () => { if(onEnd) onEnd(); };
  u.onerror = () => { if(onEnd) onEnd(); };
  speechSynthesis.speak(u);
}

function teddySay(text, msgClass, afterState) {

}

// ---- Balkan jokes ----

  "Kaže Fata prijateljici: 'Moj Mujo je životinja u krevetu.' Prijateljica: 'Oooo!' Fata: 'Da, hrče ko medvjed.'"
];
let lastJokeIdx = -1;

function getRandomJoke() {
  let idx;
  do { idx = Math.floor(Math.random() * JOKES.length); } while (idx === lastJokeIdx && JOKES.length > 1);
  lastJokeIdx = idx;
  return JOKES[idx];
}

// ---- Idle timer ----
function resetIdleTimer() {
  lastInteraction = Date.now();
  clearTimeout(idleTimer);
  idleTimer = setTimeout(checkIdle, 22000);
}

function checkIdle() {
  if (Date.now() - lastInteraction >= 20000 && state === 'IDLE' && !brainBusy) {
    const joke = getRandomJoke();
    addBotMsg(joke, 'joke');
    avatar('speaking');
    speak(joke, () => avatar('idle'));
    resetIdleTimer();
  }
}

// ---- Confused reactions ----
const CONFUSED_LINES = [
  "Ma šta kažeš, ne pričaj punih usta.",
  "Najla jesi li se to ti opet dočepala telefona?",
  "Brate, to ni ja ne razumijem, a ja sam medvjed.",
  "Ponovi to ali ovaj put na ljudskom jeziku."
];

function getConfusedLine() {
  return CONFUSED_LINES[Math.floor(Math.random() * CONFUSED_LINES.length)];
}

// ---- Logging / messages ----
function addLog(msg){
  const t=new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const e=document.createElement('div');e.className='log-entry';
  e.innerHTML=`<span class="time">${t}</span><span class="lmsg">${msg}</span>`;
  logEl.prepend(e);while(logEl.children.length>15)logEl.removeChild(logEl.lastChild);
}

function addMsg(t,type,cls){const d=document.createElement('div');d.className=`msg ${type} ${cls||''}`.trim();d.innerHTML=t;convoMessages.appendChild(d);convoBox.scrollTop=convoBox.scrollHeight;}
function addUserMsg(t){addMsg(esc(t),'user','');}
function addBotMsg(t,c){addMsg(t,'bot',c||'');}

function resetState(){state='IDLE';pendingReminder={message:'',date:'',time:'',label:''};avatar('idle');}

function getNow(){const n=new Date();const d=['nedjelja','ponedjeljak','utorak','srijeda','četvrtak','petak','subota'];return{date:n.toISOString().split('T')[0],day:d[n.getDay()],time:n.toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'})};}

const YES_WORDS=new Set(['da','yes','jes','jest','okej','ok','oke','važi','može','spremi','sačuvaj','potvrdi','super','tako','tačno','jeste']);
const NO_WORDS=new Set(['ne','no','nije','promijeni','promijeniti','promjena','change','nee','pogrešno','krivo','netačno','nazad','izmijeni']);
function checkConfirm(t){const w=t.toLowerCase().replace(/[.,!?]/g,'').trim().split(/\s+/);if(w.some(x=>NO_WORDS.has(x)))return'no';if(w.some(x=>YES_WORDS.has(x)))return'yes';return'unknown';}

// ---- API key ----
function updateDot(){apiDot.className=apiKey?'dot on':'dot';}
updateDot();if(apiKey)apiKeyInput.value=apiKey;
settingsBtn.addEventListener('click',()=>{settingsPanel.classList.toggle('open');settingsBtn.classList.toggle('active');});
saveKeyBtn.addEventListener('click',()=>{
  const k=apiKeyInput.value.trim();if(!k){keyStatus.textContent='❌';keyStatus.className='key-status err';return;}
  apiKey=k;localStorage.setItem('asistent_api_key',k);updateDot();
  // Also save voice
  if(voiceSelect.value) localStorage.setItem('asistent_voice', voiceSelect.value);
  keyStatus.textContent='✅';keyStatus.className='key-status ok';
  setTimeout(()=>{settingsPanel.classList.remove('open');settingsBtn.classList.remove('active');},600);
});

// ---- Google OAuth ----
function initGoogleAuth(){
  if(typeof google==='undefined'||!google.accounts){setTimeout(initGoogleAuth,500);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,scope:CALENDAR_SCOPE,
    callback:(r)=>{if(r.error){addLog('❌ Google: '+r.error);return;}googleAccessToken=r.access_token;gcalDot.className='dot on';addLog('✅ Calendar povezan');}
  });
}
googleSignIn.addEventListener('click',()=>{
  if(googleAccessToken){google.accounts.oauth2.revoke(googleAccessToken,()=>{googleAccessToken=null;gcalDot.className='dot';addLog('🔓 Odjava');});}
  else if(tokenClient){tokenClient.requestAccessToken();}
});

async function createCalendarEvent(r){
  if(!googleAccessToken)return false;
  const start=new Date(`${r.date}T${r.time}:00`),end=new Date(start.getTime()+30*60*1000),tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  try{
    const res=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',headers:{'Authorization':`Bearer ${googleAccessToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({summary:r.label,description:`Podsjetnik: ${r.message}`,start:{dateTime:start.toISOString(),timeZone:tz},end:{dateTime:end.toISOString(),timeZone:tz},reminders:{useDefault:false,overrides:[{method:'popup',minutes:10},{method:'popup',minutes:0}]}})
    });
    if(res.status===401){googleAccessToken=null;gcalDot.className='dot';return false;}
    if(!res.ok)throw new Error((await res.json().catch(()=>({}))).error?.message||res.statusText);
    addLog('📅 Calendar ✅');return true;
  }catch(e){addLog('❌ Cal: '+e.message);return false;}
}

// ---- Save ----
let reminders=JSON.parse(localStorage.getItem('asistent_reminders')||'[]');
async function saveReminder(){
  const r={...pendingReminder,createdAt:new Date().toISOString(),id:Date.now()};
  reminders.push(r);localStorage.setItem('asistent_reminders',JSON.stringify(reminders));
  let calOk=false;
  if(googleAccessToken){convoBox.classList.add('thinking');calOk=await createCalendarEvent(r);convoBox.classList.remove('thinking');}
  const note=calOk?'<span class="confirm-detail">📅 Calendar ✅</span>':googleAccessToken?'<span class="confirm-detail">⚠️ Calendar greška</span>':'<span class="confirm-detail">💾 Lokalno</span>';

  // Point pose + speak confirmation
  avatar('saved');
  addBotMsg(`✅ Zapamćeno!<span class="confirm-label">${esc(r.label)}</span><span class="confirm-detail">📅 ${esc(r.date)} ⏰ ${esc(r.time)}</span>${note}`,'saved');
  speak("Okey tebra, zapamćeno.", () => { setTimeout(()=>resetState(), 1000); });
  addLog(`💾 "${r.label}" @ ${r.date} ${r.time}`);
  resetIdleTimer();
}

// ---- Brain ----
async function callClaude(text,extra){
  const n=getNow();
  const base=`Ti si parser govornih komandi. Korisnik govori bosanski/hrvatski/srpski.
Danas: ${n.day}, ${n.date}. Vrijeme: ${n.time}.
Odgovori SAMO JSON. Bez teksta, markdown-a, backtick-ova.
"sutra"=sutrašnji,"prekosutra"=za 2 dana,"u petak"=sljedeći petak,"navečer"=20:00,"ujutro"=08:00,"popodne"=14:00.
Nema datuma: date=null. Nema vremena: time=null.`;
  const sys=extra?base+'\n\n'+extra:base+`
Za PODSJETNIK: {"action":"reminder","message":"opis","date":"YYYY-MM-DD ili null","time":"HH:MM ili null","suggested_label":"kratak naziv"}
Za PITANJE: {"action":"question","message":"odgovor"}
Za NEJASNO: {"action":"unclear","message":"objašnjenje"}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,system:sys,messages:[{role:'user',content:text}]})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(`API ${res.status}: ${e?.error?.message||res.statusText}`);}
  const d=await res.json();return JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
}

// ---- Handle input ----
async function handleInput(text){
  if(!apiKey){teddySay('Brate, nema API ključa. Otvori postavke.','error','idle');return;}
  if(brainBusy)return;
  brainBusy=true;convoBox.classList.add('thinking');avatar('thinking');
  resetIdleTimer();

  try{
    switch(state){
      case 'IDLE':{
        const p=await callClaude(text);
        if(p.action==='reminder'){
          pendingReminder.message=p.message||text;pendingReminder.date=p.date||'';pendingReminder.time=p.time||'';pendingReminder.label=p.suggested_label||p.message||text;
          if(!pendingReminder.date){state='NEED_DATE';teddySay('Koji datum?','ask');}
          else if(!pendingReminder.time){state='NEED_TIME';teddySay(`📅 ${pendingReminder.date} — U koliko sati?`,'ask');}
          else goToConfirm();
        }else if(p.action==='question'){
          teddySay(p.message,'');
        }else{
          // Confused — wave + funny line
          const line=getConfusedLine();
          avatar('confused');
          addBotMsg(line,'ask');
          speak(line,()=>avatar('idle'));
        }
        break;
      }
      case 'NEED_DATE':{
        const p=await callClaude(text,`Korisnik odgovara "koji datum?". Vrati: {"date":"YYYY-MM-DD ili null","time":"HH:MM ili null"}`);
        if(p.date){pendingReminder.date=p.date;if(p.time)pendingReminder.time=p.time;if(!pendingReminder.time){state='NEED_TIME';teddySay(`📅 ${pendingReminder.date} — U koliko sati?`,'ask');}else goToConfirm();}
        else teddySay('Ne kužim datum. Reci sutra, u petak, ili neki datum.','ask');
        break;
      }
      case 'NEED_TIME':{
        const p=await callClaude(text,`Korisnik odgovara "u koliko sati?". Vrati: {"time":"HH:MM ili null"}`);
        if(p.time){pendingReminder.time=p.time;goToConfirm();}
        else teddySay('Ne kužim vrijeme. Reci u devet, navečer, u 15 i 30.','ask');
        break;
      }
      case 'CONFIRM':{
        const r=checkConfirm(text);
        if(r==='yes')await saveReminder();
        else if(r==='no'){state='NEED_LABEL';teddySay('Okej, reci mi kako da ga nazovem.','ask');}
        else teddySay('Reci da ili promijeni.','ask');
        break;
      }
      case 'NEED_LABEL':{
        pendingReminder.label=text.trim();await saveReminder();break;
      }
    }
  }catch(e){
    addBotMsg(`❌ ${esc(e.message)}`,'error');avatar('idle');
  }finally{convoBox.classList.remove('thinking');brainBusy=false;}
}

function goToConfirm(){
  state='CONFIRM';
  const msg=`Spasiti kao: "${pendingReminder.label}" — 📅 ${pendingReminder.date} ⏰ ${pendingReminder.time}?`;
  addBotMsg(`${esc(msg)}<div class="hint-text">"da" ili "promijeni"</div>`,'confirm');
  avatar('speaking');
  speak(`Zapamtiti kao ${pendingReminder.label}, ${pendingReminder.date}, u ${pendingReminder.time}? Reci da ili promijeni.`,()=>{if(state==='CONFIRM')avatar('idle');});
}

// ---- Speech Recognition ----
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){unsupportedEl.style.display='block';unsupportedEl.textContent='Koristi Chrome.';micBtn.disabled=true;micBtn.style.opacity='0.3';}
if(location.protocol!=='https:'&&!['localhost','127.0.0.1'].includes(location.hostname)){unsupportedEl.style.display='block';unsupportedEl.innerHTML='⚠️ HTTPS';}

langBtns.forEach(b=>b.addEventListener('click',()=>{if(isListening)stopListening();langBtns.forEach(x=>x.classList.remove('active'));b.classList.add('active');currentLang=b.dataset.lang;}));

function createRecognition(){
  if(!SR)return null;const r=new SR();r.lang=currentLang;r.continuous=false;r.interimResults=false;r.maxAlternatives=1;
  r.onresult=(e)=>{if(e.results.length>0&&e.results[0].isFinal){const t=e.results[0][0].transcript.trim();if(t.length>0){addUserMsg(t);handleInput(t);resetIdleTimer();}}};
  r.onerror=(e)=>{if(e.error==='not-allowed'){statusEl.textContent='🔒';isListening=false;micBtn.classList.remove('listening');}};
  r.onend=()=>{if(isListening){clearTimeout(restartTimer);restartTimer=setTimeout(()=>{if(isListening)try{createRecognition()?.start();}catch(e){isListening=false;micBtn.classList.remove('listening');statusEl.textContent='tap';statusEl.classList.remove('active');}},400);}else{micBtn.classList.remove('listening');statusEl.textContent='tap';statusEl.classList.remove('active');}};
  return r;
}

function startListening(){if(!SR)return;isListening=true;micBtn.classList.add('listening');statusEl.textContent='...';statusEl.classList.add('active');avatar('listening');try{createRecognition()?.start();}catch(e){isListening=false;micBtn.classList.remove('listening');}}
function stopListening(){isListening=false;clearTimeout(restartTimer);micBtn.classList.remove('listening');statusEl.textContent='tap';statusEl.classList.remove('active');if(state==='IDLE')avatar('idle');}
micBtn.addEventListener('click',()=>{isListening?stopListening():startListening();});

clearBtn.addEventListener('click',()=>{
  convoMessages.innerHTML='';
  teddySay("Op pa, sve čisto. Reci nešto pametno.",'');
  logEl.innerHTML='';resetState();
});
cancelBtn.addEventListener('click',()=>{if(state!=='IDLE'){teddySay('Otkazano.','error','idle');resetState();}});

// ---- Greeting on load ----
window.onTeddyReady = function() {
  const greeting = "Op pa gdje si tebra, reci mi nešto pametno da zapamtim.";
  addBotMsg(greeting, '');
  setTimeout(() => {
    avatar('speaking');
    speak(greeting, () => avatar('idle'));
    resetIdleTimer();
  }, 500);
};

document.addEventListener('dblclick',e=>e.preventDefault());
initGoogleAuth();
resetIdleTimer();
</script>
