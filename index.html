<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>Asistent</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e0e0e8; --text-dim: #6b6f80;
    --accent: #4ecdc4; --accent-glow: rgba(78,205,196,0.15);
    --red: #ff6b6b; --red-glow: rgba(255,107,107,0.25);
    --gold: #f0c040; --green: #6bcf7f; --google-blue: #4285f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; padding: 1rem 1.2rem 1.5rem;
    -webkit-tap-highlight-color: transparent; overflow-x: hidden;
  }

  .container { max-width: 420px; width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; }

  .header-row { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.3rem; }

  .step-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
    color: var(--bg); background: var(--accent);
    padding: 0.2rem 0.6rem; border-radius: 3px;
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  .settings-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .settings-btn:active, .settings-btn.active { border-color: var(--accent); color: var(--accent); }
  .settings-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .api-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); position: absolute; top: -1px; right: -1px; }
  .api-dot.connected { background: var(--green); }

  .title-area { text-align: center; width: 100%; margin-bottom: 0.5rem; }
  h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 600; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.1rem; }
  .subtitle { font-size: 0.55rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }

  /* Settings */
  .settings-panel {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 1.2rem; margin-bottom: 1rem; display: none;
  }
  .settings-panel.open { display: block; }
  .settings-title { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
  .field-group { margin-bottom: 1rem; }
  .field-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
  .field-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 0.8rem; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; outline: none; }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--text-dim); }
  .field-hint { font-size: 0.6rem; color: var(--text-dim); margin-top: 0.3rem; }
  .save-key-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--bg); background: var(--accent); border: none; border-radius: 6px; padding: 0.5rem 1.2rem; cursor: pointer; }
  .key-status { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; margin-top: 0.5rem; }
  .key-status.ok { color: var(--green); }
  .key-status.err { color: var(--red); }

  /* Header icons row */
  .header-icons { display: flex; gap: 0.4rem; }

  /* Google calendar icon button */
  .gcal-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .gcal-btn:active { border-color: var(--accent); color: var(--accent); }
  .gcal-btn svg { width: 16px; height: 16px; }
  .gcal-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); position: absolute; top: -1px; right: -1px; }
  .gcal-dot.connected { background: var(--green); }

  /* Avatar canvas */
  .avatar-container {
    width: 100%;
    height: 220px;
    position: relative;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #avatarCanvas {
    width: 100%;
    height: 100%;
    border-radius: 14px;
    display: block;
  }

  .avatar-loading {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: center;
  }

  .avatar-state-label {
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    color: var(--text-dim);
    background: rgba(15,17,23,0.7);
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Mic */
  .mic-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 1rem; }
  .mic-wrapper { position: relative; display: inline-block; }
  .mic-ring { position: absolute; inset: -8px; border-radius: 50%; border: 2px solid transparent; transition: all 0.3s; pointer-events: none; }
  .mic-ring-outer { position: absolute; inset: -18px; border-radius: 50%; border: 1px solid transparent; pointer-events: none; }

  .mic-btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; position: relative; z-index: 1;
    -webkit-user-select: none; user-select: none; touch-action: manipulation;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn svg { width: 32px; height: 32px; fill: currentColor; }
  .mic-btn.listening { border-color: var(--red); color: var(--red); box-shadow: 0 0 30px var(--red-glow); animation: pulse 1.5s ease-in-out infinite; }
  .mic-btn.listening ~ .mic-ring { border-color: rgba(255,107,107,0.4); animation: ring1 1.5s ease-in-out infinite; }
  .mic-btn.listening ~ .mic-ring-outer { border-color: rgba(255,107,107,0.15); animation: ring2 1.5s ease-in-out infinite 0.2s; }

  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  @keyframes ring1 { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.1);opacity:1} }
  @keyframes ring2 { 0%,100%{transform:scale(1);opacity:.2} 50%{transform:scale(1.15);opacity:.5} }

  .status { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); margin-top: 0.8rem; min-height: 1.2em; text-align: center; }
  .status.active { color: var(--red); }

  /* Conversation */
  .convo-box {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 0.8rem 1rem; min-height: 120px; max-height: 280px;
    text-align: left; margin-bottom: 0.6rem;
    overflow-y: auto; position: relative;
  }
  .convo-box.thinking { border-color: var(--gold); }
  .convo-box.thinking::after { content: ''; position: absolute; bottom: 0; left: 0; height: 2px; background: var(--gold); animation: brainload 1.5s ease-in-out infinite; }
  @keyframes brainload { 0%{width:0;left:0} 50%{width:60%;left:20%} 100%{width:0;left:100%} }

  .convo-label { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.6rem; }

  .msg { margin-bottom: 0.5rem; padding: 0.5rem 0.7rem; border-radius: 10px; font-size: 0.82rem; line-height: 1.45; max-width: 92%; word-break: break-word; }
  .msg.user { background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.2); margin-left: auto; color: var(--accent); text-align: right; }
  .msg.bot { background: rgba(107,111,128,0.1); border: 1px solid rgba(107,111,128,0.15); color: var(--text); }
  .msg.bot.ask { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.2); color: var(--gold); }
  .msg.bot.confirm { background: rgba(78,205,196,0.08); border: 1px solid rgba(78,205,196,0.2); }
  .msg.bot.saved { background: rgba(107,207,127,0.1); border: 1px solid rgba(107,207,127,0.25); color: var(--green); }
  .msg.bot.error { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); color: var(--red); }

  .confirm-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.05em; display: block; margin-top: 0.3rem; }
  .confirm-detail { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-dim); display: block; margin-top: 0.15rem; }
  .hint-text { font-size: 0.65rem; color: var(--text-dim); font-style: italic; margin-top: 0.3rem; }

  .lang-toggle { display: flex; gap: 0.4rem; margin-bottom: 0.8rem; background: var(--surface); border-radius: 8px; padding: 0.2rem; border: 1px solid var(--border); }
  .lang-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 0.35rem 0.7rem; border: none; background: transparent; color: var(--text-dim); border-radius: 6px; cursor: pointer; }
  .lang-btn.active { background: var(--accent); color: var(--bg); }

  .log { width: 100%; flex: 1; overflow-y: auto; }
  .log-entry { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--text-dim); padding: 0.3rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; }
  .log-entry .time { color: var(--accent); flex-shrink: 0; }
  .log-entry .lmsg { color: var(--text); line-height: 1.3; }

  .unsupported { background: var(--red-glow); border: 1px solid var(--red); border-radius: 10px; padding: 0.8rem; font-size: 0.8rem; color: var(--red); margin-bottom: 0.8rem; width: 100%; text-align: center; }

  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; width: 100%; }
  .clear-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-dim); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.8rem; cursor: pointer; }
  .cancel-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--red); background: none; border: 1px solid rgba(255,107,107,0.3); border-radius: 6px; padding: 0.4rem 0.8rem; cursor: pointer; }
</style>
</head>

<!-- Three.js + VRM via importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.min.js"
  }
}
</script>

<!-- Avatar module (Three.js + VRM) -->
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

  const canvas = document.getElementById('avatarCanvas');
  const container = document.getElementById('avatarContainer');
  const loadingEl = document.getElementById('avatarLoading');
  const stateLabel = document.getElementById('avatarStateLabel');

  // Renderer
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  function resizeRenderer() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  // Scene
  const scene = new THREE.Scene();

  // Camera
  const camera = new THREE.PerspectiveCamera(25, 1, 0.1, 20);
  camera.position.set(0, 1.35, 2.2);
  camera.lookAt(0, 1.2, 0);

  // Lighting — soft and warm
  const ambientLight = new THREE.AmbientLight(0xccccdd, 1.0);
  scene.add(ambientLight);

  const keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
  keyLight.position.set(1, 2, 2);
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0x4ecdc4, 0.3);
  fillLight.position.set(-1, 1, 1);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0x4ecdc4, 0.4);
  rimLight.position.set(0, 1, -2);
  scene.add(rimLight);

  // Load VRM
  const loader = new GLTFLoader();
  loader.register((parser) => new VRMLoaderPlugin(parser));

  let vrm = null;
  let avatarState = 'idle';
  const clock = new THREE.Clock();
  let blinkTimer = 0;
  let nextBlink = 2 + Math.random() * 3;
  let mouthPhase = 0;
  let breathPhase = 0;
  let headBaseY = 0;

  loader.load(
    './LilTeddy.vrm',
    (gltf) => {
      vrm = gltf.userData.vrm;
      VRMUtils.removeUnnecessaryJoints(vrm.scene);
      scene.add(vrm.scene);
      vrm.scene.rotation.y = Math.PI; // face camera

      // Find head bone position for camera framing
      const head = vrm.humanoid?.getNormalizedBoneNode('head');
      if (head) {
        const headPos = new THREE.Vector3();
        head.getWorldPosition(headPos);
        camera.position.set(0, headPos.y, 2.0);
        camera.lookAt(0, headPos.y - 0.1, 0);
        headBaseY = headPos.y;
      }

      loadingEl.style.display = 'none';
      console.log('VRM loaded:', vrm);

      // Log available expressions
      if (vrm.expressionManager) {
        const names = vrm.expressionManager.expressions.map(e => e.expressionName);
        console.log('Available expressions:', names);
      }
    },
    (progress) => {
      if (progress.total > 0) {
        const pct = Math.round((progress.loaded / progress.total) * 100);
        loadingEl.textContent = `učitavam LilTeddy... ${pct}%`;
      }
    },
    (error) => {
      console.error('VRM load error:', error);
      loadingEl.textContent = '❌ greška pri učitavanju';
      loadingEl.style.color = '#ff6b6b';
    }
  );

  // Expression helper — safely set expression value
  function setExpr(name, value) {
    if (!vrm?.expressionManager) return;
    try {
      vrm.expressionManager.setValue(name, value);
    } catch(e) {
      // Expression might not exist on this model — ignore silently
    }
  }

  // Reset all custom expressions
  function resetExpressions() {
    ['happy', 'angry', 'sad', 'surprised', 'aa', 'ih', 'ou', 'ee', 'oh',
     'a', 'i', 'u', 'e', 'o', 'blink', 'blinkLeft', 'blinkRight',
     'lookUp', 'lookDown', 'lookLeft', 'lookRight'].forEach(n => setExpr(n, 0));
  }

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    if (vrm) {
      // --- Breathing (all states) ---
      breathPhase += delta * 1.2;
      const breathOffset = Math.sin(breathPhase) * 0.003;
      vrm.scene.position.y = breathOffset;

      // --- Blinking (all states) ---
      blinkTimer += delta;
      if (blinkTimer > nextBlink) {
        setExpr('blink', 1);
        setExpr('blinkLeft', 1);
        setExpr('blinkRight', 1);
        setTimeout(() => {
          setExpr('blink', 0);
          setExpr('blinkLeft', 0);
          setExpr('blinkRight', 0);
        }, 120);
        blinkTimer = 0;
        nextBlink = 2 + Math.random() * 4;
      }

      // --- State-specific animations ---
      switch (avatarState) {
        case 'listening':
          setExpr('happy', 0.15);
          // Slight head bob
          vrm.scene.rotation.z = Math.sin(elapsed * 2) * 0.02;
          break;

        case 'thinking':
          setExpr('lookLeft', 0.4);
          setExpr('lookUp', 0.2);
          vrm.scene.rotation.z = 0.03;
          break;

        case 'speaking':
          mouthPhase += delta * 10;
          // Vary mouth between 'aa' and 'oh' shapes
          const mouthA = Math.max(0, Math.sin(mouthPhase) * 0.5);
          const mouthO = Math.max(0, Math.sin(mouthPhase * 0.7 + 1) * 0.3);
          setExpr('aa', mouthA);
          setExpr('a', mouthA);  // try both naming conventions
          setExpr('oh', mouthO);
          setExpr('o', mouthO);
          setExpr('happy', 0.1);
          vrm.scene.rotation.z = Math.sin(elapsed * 1.5) * 0.015;
          break;

        case 'saved':
          setExpr('happy', 0.6);
          vrm.scene.rotation.z = 0;
          break;

        default: // idle
          // Gentle subtle movement
          vrm.scene.rotation.z = Math.sin(elapsed * 0.5) * 0.01;
          break;
      }

      vrm.update(delta);
    }

    renderer.render(scene, camera);
  }

  resizeRenderer();
  window.addEventListener('resize', resizeRenderer);
  animate();

  // Expose state control to the main script
  window.setAvatarState = function(newState) {
    resetExpressions();
    avatarState = newState;
    mouthPhase = 0;
    stateLabel.textContent = newState;
  };
</script>

<!-- Main app logic (non-module) -->
<script>
  // ---- Config ----
  const GOOGLE_CLIENT_ID = '930740380202-5cub8gtuk2joli9kevbhird3o2ph6vpa.apps.googleusercontent.com';
  const CALENDAR_SCOPE = 'https://www.googleapis.com/auth/calendar.events';

  // ---- DOM ----
  const $ = id => document.getElementById(id);
  const micBtn = $('micBtn'), statusEl = $('status');
  const logEl = $('log'), unsupportedEl = $('unsupported');
  const langBtns = document.querySelectorAll('.lang-btn');
  const settingsBtn = $('settingsBtn'), settingsPanel = $('settingsPanel');
  const apiKeyInput = $('apiKeyInput'), saveKeyBtn = $('saveKeyBtn'), keyStatus = $('keyStatus');
  const apiDot = $('apiDot'), convoBox = $('convoBox'), convoMessages = $('convoMessages');
  const clearBtn = $('clearBtn'), cancelBtn = $('cancelBtn');
  const googleSignIn = $('googleSignIn'), gcalDot = $('gcalDot');

  // ---- Avatar helper ----
  function avatar(state) {
    if (window.setAvatarState) window.setAvatarState(state);
  }

  // ---- State ----
  let currentLang = 'hr-HR';
  let isListening = false;
  let apiKey = localStorage.getItem('asistent_api_key') || '';
  let brainBusy = false;
  let restartTimer = null;
  let state = 'IDLE';
  let pendingReminder = { message: '', date: '', time: '', label: '' };
  let googleAccessToken = null;
  let tokenClient = null;

  // ---- Helpers ----
  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function addLog(msg) {
    const t = new Date().toLocaleTimeString('hr-HR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const e = document.createElement('div');
    e.className = 'log-entry';
    e.innerHTML = `<span class="time">${t}</span><span class="lmsg">${msg}</span>`;
    logEl.prepend(e);
    while (logEl.children.length > 15) logEl.removeChild(logEl.lastChild);
  }

  function addMsg(text, type, extra) {
    const d = document.createElement('div');
    d.className = `msg ${type} ${extra || ''}`.trim();
    d.innerHTML = text;
    convoMessages.appendChild(d);
    convoBox.scrollTop = convoBox.scrollHeight;
  }
  function addUserMsg(t) { addMsg(esc(t), 'user', ''); }
  function addBotMsg(t, c) { addMsg(t, 'bot', c || ''); }

  function resetState() { state = 'IDLE'; pendingReminder = { message:'',date:'',time:'',label:'' }; avatar('idle'); }

  function getNow() {
    const n = new Date();
    const d = ['nedjelja','ponedjeljak','utorak','srijeda','četvrtak','petak','subota'];
    return { date: n.toISOString().split('T')[0], day: d[n.getDay()], time: n.toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}) };
  }

  const YES_WORDS = new Set(['da','yes','jes','jest','okej','ok','oke','važi','može','spremi','sačuvaj','potvrdi','super','tako','tačno','jeste']);
  const NO_WORDS = new Set(['ne','no','nije','promijeni','promijeniti','promjena','change','nee','pogrešno','krivo','netačno','nazad','izmijeni']);
  function checkConfirm(t) {
    const w = t.toLowerCase().replace(/[.,!?]/g,'').trim().split(/\s+/);
    if (w.some(x => NO_WORDS.has(x))) return 'no';
    if (w.some(x => YES_WORDS.has(x))) return 'yes';
    return 'unknown';
  }

  // ---- API key ----
  function updateDot() { apiDot.className = apiKey ? 'api-dot connected' : 'api-dot'; }
  updateDot();
  if (apiKey) apiKeyInput.value = apiKey;

  settingsBtn.addEventListener('click', () => { settingsPanel.classList.toggle('open'); settingsBtn.classList.toggle('active'); });

  saveKeyBtn.addEventListener('click', () => {
    const k = apiKeyInput.value.trim();
    if (!k) { keyStatus.textContent = '❌ Unesi ključ'; keyStatus.className = 'key-status err'; return; }
    apiKey = k; localStorage.setItem('asistent_api_key', k); updateDot();
    keyStatus.textContent = '✅ Spremljeno'; keyStatus.className = 'key-status ok';
    setTimeout(() => { settingsPanel.classList.remove('open'); settingsBtn.classList.remove('active'); }, 800);
  });

  // ---- Google OAuth ----
  function initGoogleAuth() {
    if (typeof google === 'undefined' || !google.accounts) { setTimeout(initGoogleAuth, 500); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID, scope: CALENDAR_SCOPE,
      callback: (r) => {
        if (r.error) { addLog('❌ Google: ' + r.error); return; }
        googleAccessToken = r.access_token;
        gcalDot.className = 'gcal-dot connected';
        addLog('✅ Google Calendar povezan');
      }
    });
  }

  googleSignIn.addEventListener('click', () => {
    if (googleAccessToken) {
      google.accounts.oauth2.revoke(googleAccessToken, () => {
        googleAccessToken = null;
        gcalDot.className = 'gcal-dot';
        addLog('🔓 Google odjava');
      });
    } else if (tokenClient) { tokenClient.requestAccessToken(); }
  });

  async function createCalendarEvent(r) {
    if (!googleAccessToken) return false;
    const start = new Date(`${r.date}T${r.time}:00`);
    const end = new Date(start.getTime() + 30*60*1000);
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    try {
      const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${googleAccessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          summary: r.label, description: `Podsjetnik: ${r.message}`,
          start: { dateTime: start.toISOString(), timeZone: tz },
          end: { dateTime: end.toISOString(), timeZone: tz },
          reminders: { useDefault: false, overrides: [{ method:'popup', minutes:10 },{ method:'popup', minutes:0 }] }
        })
      });
      if (res.status === 401) { googleAccessToken = null; gcalDot.className = 'gcal-dot'; addLog('⚠️ Token istekao'); return false; }
      if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error?.message || res.statusText);
      addLog('📅 Calendar event kreiran');
      return true;
    } catch(e) { addLog('❌ Calendar: '+e.message); return false; }
  }

  // ---- Save ----
  let reminders = JSON.parse(localStorage.getItem('asistent_reminders') || '[]');

  async function saveReminder() {
    const r = { ...pendingReminder, createdAt: new Date().toISOString(), id: Date.now() };
    reminders.push(r); localStorage.setItem('asistent_reminders', JSON.stringify(reminders));

    avatar('saved');
    let calOk = false;
    if (googleAccessToken) { convoBox.classList.add('thinking'); calOk = await createCalendarEvent(r); convoBox.classList.remove('thinking'); }

    const note = calOk ? '<span class="confirm-detail">📅 Google Calendar ✅</span>'
      : googleAccessToken ? '<span class="confirm-detail">⚠️ Calendar greška — lokalno</span>'
      : '<span class="confirm-detail">💾 Lokalno (poveži Calendar za sync)</span>';

    addBotMsg(`✅ Spremljeno!<span class="confirm-label">${esc(r.label)}</span><span class="confirm-detail">📅 ${esc(r.date)}  ⏰ ${esc(r.time)}</span>${note}`, 'saved');
    setTimeout(() => resetState(), 2000);
  }

  // ---- Brain ----
  async function callClaude(text, extra) {
    const n = getNow();
    const base = `Ti si parser govornih komandi. Korisnik govori bosanski/hrvatski/srpski.
Danas: ${n.day}, ${n.date}. Vrijeme: ${n.time}.
Odgovori SAMO JSON. Bez teksta, markdown-a, backtick-ova.
Datumi: "sutra"=sutrašnji, "prekosutra"=za 2 dana, "u petak"=sljedeći petak, "navečer"=20:00, "ujutro"=08:00, "popodne"=14:00.
Ako nema datuma: date=null. Ako nema vremena: time=null.`;

    const sys = extra ? base+'\n\n'+extra : base+`
Za PODSJETNIK: {"action":"reminder","message":"opis","date":"YYYY-MM-DD ili null","time":"HH:MM ili null","suggested_label":"kratak naziv"}
Za PITANJE: {"action":"question","message":"odgovor"}
Za NEJASNO: {"action":"unclear","message":"objašnjenje"}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:300, system:sys, messages:[{role:'user',content:text}] })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(`API ${res.status}: ${e?.error?.message||res.statusText}`); }
    const d = await res.json();
    return JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
  }

  // ---- Handle input ----
  async function handleInput(text) {
    if (!apiKey) { addBotMsg('❌ Nema API ključa — ⚙️','error'); return; }
    if (brainBusy) return;
    brainBusy = true;
    convoBox.classList.add('thinking');
    avatar('thinking');

    try {
      switch (state) {
        case 'IDLE': {
          const p = await callClaude(text);
          if (p.action === 'reminder') {
            pendingReminder.message = p.message||text;
            pendingReminder.date = p.date||'';
            pendingReminder.time = p.time||'';
            pendingReminder.label = p.suggested_label||p.message||text;

            if (!pendingReminder.date) {
              state = 'NEED_DATE';
              addBotMsg(`📝 ${esc(pendingReminder.message)}<div class="hint-text">Koji datum?</div>`,'ask');
              avatar('speaking');
            } else if (!pendingReminder.time) {
              state = 'NEED_TIME';
              addBotMsg(`📝 ${esc(pendingReminder.message)} — 📅 ${esc(pendingReminder.date)}<div class="hint-text">U koliko sati?</div>`,'ask');
              avatar('speaking');
            } else { avatar('speaking'); goToConfirm(); }
          } else if (p.action === 'question') {
            addBotMsg(esc(p.message)); avatar('speaking');
          } else {
            addBotMsg(esc(p.message||'Nisam razumio.'),'ask'); avatar('speaking');
          }
          break;
        }
        case 'NEED_DATE': {
          const p = await callClaude(text, `Korisnik odgovara "koji datum?". Vrati: {"date":"YYYY-MM-DD ili null","time":"HH:MM ili null"}`);
          if (p.date) {
            pendingReminder.date = p.date; if (p.time) pendingReminder.time = p.time;
            if (!pendingReminder.time) { state='NEED_TIME'; addBotMsg(`📅 ${esc(pendingReminder.date)}<div class="hint-text">U koliko sati?</div>`,'ask'); avatar('speaking'); }
            else { avatar('speaking'); goToConfirm(); }
          } else { addBotMsg('Nisam razumio datum.','ask'); avatar('speaking'); }
          break;
        }
        case 'NEED_TIME': {
          const p = await callClaude(text, `Korisnik odgovara "u koliko sati?". Vrati: {"time":"HH:MM ili null"}`);
          if (p.time) { pendingReminder.time = p.time; avatar('speaking'); goToConfirm(); }
          else { addBotMsg('Nisam razumio vrijeme.','ask'); avatar('speaking'); }
          break;
        }
        case 'CONFIRM': {
          const r = checkConfirm(text);
          if (r === 'yes') { await saveReminder(); }
          else if (r === 'no') { state='NEED_LABEL'; addBotMsg('Izgovori naziv podsjetnika.','ask'); avatar('speaking'); }
          else { addBotMsg('"da" za spremiti ili "promijeni"','ask'); avatar('speaking'); }
          break;
        }
        case 'NEED_LABEL': {
          pendingReminder.label = text.trim();
          await saveReminder();
          break;
        }
      }
    } catch(e) {
      addBotMsg(`❌ ${esc(e.message)}`,'error'); avatar('idle');
    } finally {
      convoBox.classList.remove('thinking');
      brainBusy = false;
      // Return to idle after speaking pause (unless saved — that has its own timer)
      if (state !== 'IDLE' || avatarState === 'speaking') {
        setTimeout(() => { if (!brainBusy && state === 'IDLE') avatar('idle'); }, 3000);
      }
    }
  }

  function goToConfirm() {
    state = 'CONFIRM';
    addBotMsg(
      `Spasiti kao:<span class="confirm-label">"${esc(pendingReminder.label)}"</span>`+
      `<span class="confirm-detail">📅 ${esc(pendingReminder.date)}  ⏰ ${esc(pendingReminder.time)}</span>`+
      `<div class="hint-text">"da" ili "promijeni"</div>`, 'confirm'
    );
  }

  // ---- Speech ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { unsupportedEl.style.display='block'; unsupportedEl.textContent='Koristi Chrome.'; micBtn.disabled=true; micBtn.style.opacity='0.3'; }
  if (location.protocol !== 'https:' && !['localhost','127.0.0.1'].includes(location.hostname)) {
    unsupportedEl.style.display='block'; unsupportedEl.innerHTML='⚠️ HTTPS potreban.';
  }

  langBtns.forEach(b => b.addEventListener('click', () => {
    if (isListening) stopListening();
    langBtns.forEach(x => x.classList.remove('active'));
    b.classList.add('active'); currentLang = b.dataset.lang;
  }));

  function createRecognition() {
    if (!SR) return null;
    const r = new SR(); r.lang = currentLang; r.continuous = false; r.interimResults = false; r.maxAlternatives = 1;
    r.onresult = (e) => {
      if (e.results.length > 0 && e.results[0].isFinal) {
        const t = e.results[0][0].transcript.trim();
        if (t.length > 0) { addUserMsg(t); avatar('listening'); handleInput(t); }
      }
    };
    r.onerror = (e) => { if (e.error==='not-allowed') { statusEl.textContent='mikrofon blokiran'; isListening=false; micBtn.classList.remove('listening'); } };
    r.onend = () => {
      if (isListening) {
        clearTimeout(restartTimer);
        restartTimer = setTimeout(() => { if (isListening) try { createRecognition()?.start(); } catch(e) { isListening=false; micBtn.classList.remove('listening'); statusEl.textContent='tap mikrofon'; statusEl.classList.remove('active'); } }, 400);
      } else { micBtn.classList.remove('listening'); statusEl.textContent='tap mikrofon'; statusEl.classList.remove('active'); avatar('idle'); }
    };
    return r;
  }

  function startListening() {
    if (!SR) return;
    isListening = true; micBtn.classList.add('listening');
    statusEl.textContent = 'slušam...'; statusEl.classList.add('active');
    avatar('listening');
    try { createRecognition()?.start(); } catch(e) { isListening=false; micBtn.classList.remove('listening'); }
  }

  function stopListening() {
    isListening = false; clearTimeout(restartTimer);
    micBtn.classList.remove('listening'); statusEl.textContent='tap mikrofon'; statusEl.classList.remove('active');
    avatar('idle');
  }

  micBtn.addEventListener('click', () => { isListening ? stopListening() : startListening(); });

  clearBtn.addEventListener('click', () => {
    convoMessages.innerHTML = '<div class="msg bot">Zdravo! Ja sam LilTeddy. Reci mi šta da zapamtim. 🧸</div>';
    logEl.innerHTML = ''; resetState();
  });

  cancelBtn.addEventListener('click', () => { if (state !== 'IDLE') { addBotMsg('❌ Otkazano.','error'); resetState(); } });

  document.addEventListener('dblclick', e => e.preventDefault());
  initGoogleAuth();
</script>
