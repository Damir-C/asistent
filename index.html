<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>Asistent</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e0e0e8; --text-dim: #6b6f80;
    --accent: #4ecdc4; --accent-glow: rgba(78,205,196,0.15);
    --red: #ff6b6b; --red-glow: rgba(255,107,107,0.25);
    --gold: #f0c040; --green: #6bcf7f; --google-blue: #4285f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; padding: 1.5rem 1.2rem;
    -webkit-tap-highlight-color: transparent; overflow-x: hidden;
  }

  .container { max-width: 420px; width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; }

  .header-row { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }

  .step-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
    color: var(--bg); background: var(--accent);
    padding: 0.2rem 0.6rem; border-radius: 3px;
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  .settings-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; position: relative;
  }
  .settings-btn:active, .settings-btn.active { border-color: var(--accent); color: var(--accent); }
  .settings-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .api-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); position: absolute; top: -1px; right: -1px; }
  .api-dot.connected { background: var(--green); }

  .title-area { text-align: center; width: 100%; margin-bottom: 1rem; }
  h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 600; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.2rem; }
  .subtitle { font-size: 0.75rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  /* Settings */
  .settings-panel {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 1.2rem; margin-bottom: 1rem; display: none;
  }
  .settings-panel.open { display: block; }
  .settings-title { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
  .field-group { margin-bottom: 1rem; }
  .field-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
  .field-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.7rem 0.8rem; color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; outline: none;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--text-dim); }
  .field-hint { font-size: 0.6rem; color: var(--text-dim); margin-top: 0.3rem; line-height: 1.4; }
  .save-key-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--bg);
    background: var(--accent); border: none; border-radius: 6px; padding: 0.5rem 1.2rem; cursor: pointer;
  }
  .key-status { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; margin-top: 0.5rem; }
  .key-status.ok { color: var(--green); }
  .key-status.err { color: var(--red); }

  /* Google sign-in bar */
  .google-bar {
    width: 100%; display: flex; align-items: center; justify-content: center;
    gap: 0.6rem; margin-bottom: 1rem; padding: 0.6rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  }

  .google-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    padding: 0.45rem 0.9rem; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); transition: all 0.2s; display: flex;
    align-items: center; gap: 0.4rem;
  }
  .google-btn:active { border-color: var(--google-blue); color: var(--google-blue); }
  .google-btn svg { width: 14px; height: 14px; }

  .google-status {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-dim);
  }
  .google-status.signed-in { color: var(--green); }

  .google-signout {
    font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
    color: var(--text-dim); background: none; border: none;
    cursor: pointer; text-decoration: underline;
  }

  /* Mic */
  .mic-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; }
  .mic-wrapper { position: relative; display: inline-block; }
  .mic-ring { position: absolute; inset: -10px; border-radius: 50%; border: 2px solid transparent; transition: all 0.3s; pointer-events: none; }
  .mic-ring-outer { position: absolute; inset: -22px; border-radius: 50%; border: 1px solid transparent; pointer-events: none; }

  .mic-btn {
    width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; position: relative; z-index: 1;
    -webkit-user-select: none; user-select: none; touch-action: manipulation;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn svg { width: 44px; height: 44px; fill: currentColor; }
  .mic-btn.listening { border-color: var(--red); color: var(--red); box-shadow: 0 0 40px var(--red-glow); animation: pulse 1.5s ease-in-out infinite; }
  .mic-btn.listening ~ .mic-ring { border-color: rgba(255,107,107,0.4); animation: ring1 1.5s ease-in-out infinite; }
  .mic-btn.listening ~ .mic-ring-outer { border-color: rgba(255,107,107,0.15); animation: ring2 1.5s ease-in-out infinite 0.2s; }

  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  @keyframes ring1 { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.1);opacity:1} }
  @keyframes ring2 { 0%,100%{transform:scale(1);opacity:.2} 50%{transform:scale(1.15);opacity:.5} }

  .status { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-dim); margin-top: 1.2rem; min-height: 1.2em; text-align: center; }
  .status.active { color: var(--red); }

  /* Conversation */
  .convo-box {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 1rem 1.2rem; min-height: 160px; max-height: 350px;
    text-align: left; margin-bottom: 0.8rem;
    overflow-y: auto; position: relative;
  }
  .convo-box.thinking { border-color: var(--gold); }
  .convo-box.thinking::after {
    content: ''; position: absolute; bottom: 0; left: 0; height: 2px;
    background: var(--gold); animation: brainload 1.5s ease-in-out infinite;
  }
  @keyframes brainload { 0%{width:0;left:0} 50%{width:60%;left:20%} 100%{width:0;left:100%} }

  .convo-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.8rem; }

  .msg {
    margin-bottom: 0.7rem; padding: 0.6rem 0.8rem; border-radius: 10px;
    font-size: 0.9rem; line-height: 1.5; max-width: 92%; word-break: break-word;
  }
  .msg.user { background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.2); margin-left: auto; color: var(--accent); text-align: right; }
  .msg.bot { background: rgba(107,111,128,0.1); border: 1px solid rgba(107,111,128,0.15); color: var(--text); }
  .msg.bot.ask { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.2); color: var(--gold); }
  .msg.bot.confirm { background: rgba(78,205,196,0.08); border: 1px solid rgba(78,205,196,0.2); }
  .msg.bot.saved { background: rgba(107,207,127,0.1); border: 1px solid rgba(107,207,127,0.25); color: var(--green); }
  .msg.bot.error { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); color: var(--red); }

  .confirm-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.05em; display: block; margin-top: 0.3rem; }
  .confirm-detail { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-dim); display: block; margin-top: 0.15rem; }
  .hint-text { font-size: 0.7rem; color: var(--text-dim); font-style: italic; margin-top: 0.3rem; }

  .lang-toggle {
    display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
    background: var(--surface); border-radius: 8px;
    padding: 0.25rem; border: 1px solid var(--border);
  }
  .lang-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    padding: 0.4rem 0.8rem; border: none; background: transparent;
    color: var(--text-dim); border-radius: 6px; cursor: pointer; letter-spacing: 0.05em;
  }
  .lang-btn.active { background: var(--accent); color: var(--bg); }

  .log { width: 100%; flex: 1; overflow-y: auto; }
  .log-entry {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-dim);
    padding: 0.4rem 0; border-bottom: 1px solid var(--border);
    display: flex; gap: 0.6rem; align-items: flex-start;
  }
  .log-entry .time { color: var(--accent); flex-shrink: 0; }
  .log-entry .lmsg { color: var(--text); line-height: 1.4; }

  .unsupported {
    background: var(--red-glow); border: 1px solid var(--red);
    border-radius: 10px; padding: 1rem; font-size: 0.85rem; color: var(--red);
    margin-bottom: 1rem; width: 100%; text-align: center;
  }

  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.8rem; width: 100%; }
  .clear-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    color: var(--text-dim); background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 0.4rem 0.8rem; cursor: pointer;
  }
  .clear-btn:active { border-color: var(--accent); color: var(--accent); }
  .cancel-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    color: var(--red); background: none; border: 1px solid rgba(255,107,107,0.3);
    border-radius: 6px; padding: 0.4rem 0.8rem; cursor: pointer;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header-row">
    <div class="step-badge">Step 3 / 5 — Calendar</div>
    <button class="settings-btn" id="settingsBtn">
      <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      <div class="api-dot" id="apiDot"></div>
    </button>
  </div>

  <div class="title-area">
    <h1>ASISTENT</h1>
    <div class="subtitle">voice + brain + calendar</div>
  </div>

  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">Postavke</div>
    <div class="field-group">
      <div class="field-label">Anthropic API Key</div>
      <input type="password" class="field-input" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
      <div class="field-hint">Čuva se samo na tvom uređaju.</div>
    </div>
    <button class="save-key-btn" id="saveKeyBtn">Spremi ključ</button>
    <div class="key-status" id="keyStatus"></div>
  </div>

  <!-- Google sign-in -->
  <div class="google-bar" id="googleBar">
    <button class="google-btn" id="googleSignIn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Poveži Google Calendar
    </button>
    <span class="google-status" id="googleStatus"></span>
  </div>

  <div id="unsupported" class="unsupported" style="display:none;"></div>

  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="hr-HR">Bosanski</button>
    <button class="lang-btn" data-lang="sr-RS">Srpski</button>
    <button class="lang-btn" data-lang="en-US">English</button>
  </div>

  <div class="mic-area">
    <div class="mic-wrapper">
      <div class="mic-ring"></div>
      <div class="mic-ring-outer"></div>
      <button class="mic-btn" id="micBtn" aria-label="Mikrofon">
        <svg viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>
    <div class="status" id="status">tap mikrofon za početak</div>
  </div>

  <div class="convo-box" id="convoBox">
    <div class="convo-label">razgovor</div>
    <div id="convoMessages">
      <div class="msg bot">Zdravo! Poveži Google Calendar, pa mi reci šta da zapamtim.</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="clear-btn" id="clearBtn">očisti</button>
    <button class="cancel-btn" id="cancelBtn">otkaži</button>
  </div>

  <div class="log" id="log"></div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
  // ---- Config ----
  const GOOGLE_CLIENT_ID = '930740380202-5cub8gtuk2joli9kevbhird3o2ph6vpa.apps.googleusercontent.com';
  const CALENDAR_SCOPE = 'https://www.googleapis.com/auth/calendar.events';

  // ---- DOM ----
  const $ = id => document.getElementById(id);
  const micBtn = $('micBtn'), statusEl = $('status');
  const logEl = $('log'), unsupportedEl = $('unsupported');
  const langBtns = document.querySelectorAll('.lang-btn');
  const settingsBtn = $('settingsBtn'), settingsPanel = $('settingsPanel');
  const apiKeyInput = $('apiKeyInput'), saveKeyBtn = $('saveKeyBtn'), keyStatus = $('keyStatus');
  const apiDot = $('apiDot'), convoBox = $('convoBox'), convoMessages = $('convoMessages');
  const clearBtn = $('clearBtn'), cancelBtn = $('cancelBtn');
  const googleSignIn = $('googleSignIn'), googleStatus = $('googleStatus'), googleBar = $('googleBar');

  // ---- State ----
  let currentLang = 'hr-HR';
  let isListening = false;
  let apiKey = localStorage.getItem('asistent_api_key') || '';
  let brainBusy = false;
  let restartTimer = null;

  let state = 'IDLE';
  let pendingReminder = { message: '', date: '', time: '', label: '' };

  // Google OAuth
  let googleAccessToken = null;
  let tokenClient = null;

  // ---- Helpers ----
  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function addLog(msg) {
    const t = new Date().toLocaleTimeString('hr-HR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const e = document.createElement('div');
    e.className = 'log-entry';
    e.innerHTML = `<span class="time">${t}</span><span class="lmsg">${msg}</span>`;
    logEl.prepend(e);
    while (logEl.children.length > 15) logEl.removeChild(logEl.lastChild);
  }

  function addMsg(text, type, extraClass) {
    const d = document.createElement('div');
    d.className = `msg ${type} ${extraClass || ''}`.trim();
    d.innerHTML = text;
    convoMessages.appendChild(d);
    convoBox.scrollTop = convoBox.scrollHeight;
  }
  function addUserMsg(text) { addMsg(esc(text), 'user', ''); }
  function addBotMsg(text, cls) { addMsg(text, 'bot', cls || ''); }

  function resetState() {
    state = 'IDLE';
    pendingReminder = { message: '', date: '', time: '', label: '' };
    addLog('🔄 State → IDLE');
  }

  function getNow() {
    const now = new Date();
    const days = ['nedjelja','ponedjeljak','utorak','srijeda','četvrtak','petak','subota'];
    return { date: now.toISOString().split('T')[0], day: days[now.getDay()], time: now.toLocaleTimeString('hr-HR', { hour:'2-digit', minute:'2-digit' }) };
  }

  // ---- Confirm word matching ----
  const YES_WORDS = new Set(['da','yes','jes','jest','okej','ok','oke','važi','može','spremi','sačuvaj','potvrdi','super','tako','tačno','jeste']);
  const NO_WORDS = new Set(['ne','no','nije','promijeni','promijeniti','promjena','change','nee','pogrešno','krivo','netačno','nazad','izmijeni']);

  function checkConfirm(text) {
    const words = text.toLowerCase().replace(/[.,!?]/g, '').trim().split(/\s+/);
    const hasNo = words.some(w => NO_WORDS.has(w));
    const hasYes = words.some(w => YES_WORDS.has(w));
    if (hasNo) return 'no';
    if (hasYes) return 'yes';
    return 'unknown';
  }

  // ---- API key ----
  function updateDot() { apiDot.className = apiKey ? 'api-dot connected' : 'api-dot'; }
  updateDot();
  if (apiKey) apiKeyInput.value = apiKey;

  settingsBtn.addEventListener('click', () => {
    settingsPanel.classList.toggle('open');
    settingsBtn.classList.toggle('active');
  });

  saveKeyBtn.addEventListener('click', () => {
    const k = apiKeyInput.value.trim();
    if (!k) { keyStatus.textContent = '❌ Unesi ključ'; keyStatus.className = 'key-status err'; return; }
    apiKey = k;
    localStorage.setItem('asistent_api_key', k);
    updateDot();
    keyStatus.textContent = '✅ Spremljeno'; keyStatus.className = 'key-status ok';
    addLog('🔑 API ključ spremljen');
    setTimeout(() => { settingsPanel.classList.remove('open'); settingsBtn.classList.remove('active'); }, 800);
  });

  // ============================================
  // GOOGLE OAUTH + CALENDAR
  // ============================================
  function initGoogleAuth() {
    if (typeof google === 'undefined' || !google.accounts) {
      // GIS library not loaded yet, retry
      setTimeout(initGoogleAuth, 500);
      return;
    }

    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: CALENDAR_SCOPE,
      callback: (response) => {
        if (response.error) {
          addLog(`❌ Google: ${response.error}`);
          googleStatus.textContent = '❌ Greška';
          googleStatus.className = 'google-status';
          return;
        }
        googleAccessToken = response.access_token;
        googleStatus.textContent = '✅ Povezan';
        googleStatus.className = 'google-status signed-in';
        googleSignIn.innerHTML = `
          <svg viewBox="0 0 24 24"><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/></svg>
          Odjavi se
        `;
        addLog('✅ Google Calendar povezan');
      }
    });

    addLog('🔗 Google auth spreman');
  }

  googleSignIn.addEventListener('click', () => {
    if (googleAccessToken) {
      // Sign out
      google.accounts.oauth2.revoke(googleAccessToken, () => {
        googleAccessToken = null;
        googleStatus.textContent = '';
        googleStatus.className = 'google-status';
        googleSignIn.innerHTML = `
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Poveži Google Calendar
        `;
        addLog('🔓 Google odjava');
      });
    } else if (tokenClient) {
      tokenClient.requestAccessToken();
    } else {
      addLog('❌ Google auth nije spreman');
    }
  });

  // Create Google Calendar event
  async function createCalendarEvent(reminder) {
    if (!googleAccessToken) {
      addLog('⚠️ Nema Google tokena, samo lokalno spremanje');
      return false;
    }

    // Build start datetime
    const startDateTime = `${reminder.date}T${reminder.time}:00`;
    const startDate = new Date(startDateTime);
    const endDate = new Date(startDate.getTime() + 30 * 60 * 1000); // 30 min duration

    const event = {
      summary: reminder.label,
      description: `Podsjetnik od Asistenta: ${reminder.message}`,
      start: {
        dateTime: startDate.toISOString(),
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
      },
      end: {
        dateTime: endDate.toISOString(),
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
      },
      reminders: {
        useDefault: false,
        overrides: [
          { method: 'popup', minutes: 10 },
          { method: 'popup', minutes: 0 }
        ]
      }
    };

    try {
      const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${googleAccessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(event)
      });

      if (res.status === 401) {
        // Token expired — re-auth
        addLog('🔄 Token istekao, ponovo se prijavi');
        googleAccessToken = null;
        googleStatus.textContent = '⚠️ Isteklo';
        googleStatus.className = 'google-status';
        return false;
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || res.statusText);
      }

      const data = await res.json();
      addLog(`📅 Calendar event kreiran: ${data.htmlLink}`);
      return true;

    } catch (err) {
      addLog(`❌ Calendar: ${err.message}`);
      return false;
    }
  }

  // ---- Save reminder ----
  let reminders = JSON.parse(localStorage.getItem('asistent_reminders') || '[]');

  async function saveReminder() {
    const r = { ...pendingReminder, createdAt: new Date().toISOString(), id: Date.now() };

    // Save locally
    reminders.push(r);
    localStorage.setItem('asistent_reminders', JSON.stringify(reminders));

    // Try Google Calendar
    let calendarOk = false;
    if (googleAccessToken) {
      convoBox.classList.add('thinking');
      calendarOk = await createCalendarEvent(r);
      convoBox.classList.remove('thinking');
    }

    const calendarNote = calendarOk
      ? '<span class="confirm-detail">📅 Dodano u Google Calendar ✅</span>'
      : googleAccessToken
        ? '<span class="confirm-detail">⚠️ Calendar greška — spremljeno lokalno</span>'
        : '<span class="confirm-detail">💾 Spremljeno lokalno (poveži Calendar za sync)</span>';

    addBotMsg(
      `✅ Spremljeno!<span class="confirm-label">${esc(r.label)}</span>` +
      `<span class="confirm-detail">📅 ${esc(r.date)}  ⏰ ${esc(r.time)}</span>` +
      calendarNote,
      'saved'
    );
    addLog(`💾 Saved: "${r.label}" @ ${r.date} ${r.time}`);
    resetState();
  }

  // ---- Brain: Claude API ----
  async function callClaude(userText, systemExtra) {
    const n = getNow();
    const baseSystem = `Ti si parser govornih komandi za AI asistenta. Korisnik govori bosanski/hrvatski/srpski.
Danas je ${n.day}, ${n.date}. Trenutno vrijeme: ${n.time}.
Odgovori SAMO sa JSON objektom. Bez teksta, bez markdown-a, bez backtick-ova.

Pravila za datume:
- "sutra" = sutrašnji datum
- "prekosutra" = za dva dana
- "u petak" = sljedeći petak
- "za sat vremena" = izračunaj od trenutnog vremena
- "navečer" = 20:00, "ujutro" = 08:00, "popodne" = 14:00
- Ako korisnik ne kaže datum, date mora biti null
- Ako korisnik ne kaže vrijeme, time mora biti null`;

    let fullSystem;
    if (systemExtra) {
      fullSystem = baseSystem + '\n\n' + systemExtra;
    } else {
      fullSystem = baseSystem + `

Analiziraj korisnikov unos i vrati JSON:

Za PODSJETNIK:
{"action":"reminder","message":"opis podsjetnika","date":"YYYY-MM-DD ili null","time":"HH:MM ili null","suggested_label":"kratak naziv (2-5 riječi)"}

Za PITANJE:
{"action":"question","message":"kratak odgovor"}

Za NEJASNO:
{"action":"unclear","message":"objašnjenje"}`;
    }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: fullSystem,
        messages: [{ role: 'user', content: userText }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(`API ${res.status}: ${err?.error?.message || res.statusText}`);
    }

    const data = await res.json();
    const raw = data.content?.[0]?.text || '';
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  }

  // ---- Handle input by state ----
  async function handleInput(text) {
    if (!apiKey) { addBotMsg('❌ Nema API ključa — otvori ⚙️', 'error'); return; }
    if (brainBusy) { addLog('⏳ Brain zauzet'); return; }
    brainBusy = true;
    convoBox.classList.add('thinking');

    try {
      switch (state) {
        case 'IDLE': {
          addLog(`🧠 [IDLE] "${text}"`);
          const p = await callClaude(text);
          if (p.action === 'reminder') {
            pendingReminder.message = p.message || text;
            pendingReminder.date = p.date || '';
            pendingReminder.time = p.time || '';
            pendingReminder.label = p.suggested_label || p.message || text;

            if (!pendingReminder.date) {
              state = 'NEED_DATE';
              addBotMsg(`📝 ${esc(pendingReminder.message)}<div class="hint-text">Koji datum? (npr. "sutra", "u petak")</div>`, 'ask');
              addLog('→ NEED_DATE');
            } else if (!pendingReminder.time) {
              state = 'NEED_TIME';
              addBotMsg(`📝 ${esc(pendingReminder.message)} — 📅 ${esc(pendingReminder.date)}<div class="hint-text">U koliko sati?</div>`, 'ask');
              addLog('→ NEED_TIME');
            } else { goToConfirm(); }
          } else if (p.action === 'question') {
            addBotMsg(esc(p.message));
          } else {
            addBotMsg(esc(p.message || 'Nisam razumio.'), 'ask');
          }
          break;
        }

        case 'NEED_DATE': {
          addLog(`🧠 [NEED_DATE] "${text}"`);
          const p = await callClaude(text,
            `Korisnik odgovara "koji datum?" za podsjetnik.\nVrati SAMO: {"date":"YYYY-MM-DD ili null","time":"HH:MM ili null"}`
          );
          if (p.date) {
            pendingReminder.date = p.date;
            if (p.time) pendingReminder.time = p.time;
            if (!pendingReminder.time) {
              state = 'NEED_TIME';
              addBotMsg(`📅 ${esc(pendingReminder.date)}<div class="hint-text">U koliko sati?</div>`, 'ask');
              addLog('→ NEED_TIME');
            } else { goToConfirm(); }
          } else {
            addBotMsg('Nisam razumio datum. Npr. "sutra", "u petak".', 'ask');
          }
          break;
        }

        case 'NEED_TIME': {
          addLog(`🧠 [NEED_TIME] "${text}"`);
          const p = await callClaude(text,
            `Korisnik odgovara "u koliko sati?" za podsjetnik.\nVrati SAMO: {"time":"HH:MM ili null"}`
          );
          if (p.time) {
            pendingReminder.time = p.time;
            goToConfirm();
          } else {
            addBotMsg('Nisam razumio vrijeme. Npr. "u devet", "navečer".', 'ask');
          }
          break;
        }

        case 'CONFIRM': {
          addLog(`🧠 [CONFIRM] "${text}"`);
          const result = checkConfirm(text);
          if (result === 'yes') { await saveReminder(); }
          else if (result === 'no') {
            state = 'NEED_LABEL';
            addBotMsg('Izgovori kako želiš da se zove podsjetnik.', 'ask');
            addLog('→ NEED_LABEL');
          } else {
            addBotMsg('Reci "da" za spremiti ili "promijeni" za novi naziv.', 'ask');
          }
          break;
        }

        case 'NEED_LABEL': {
          addLog(`🧠 [NEED_LABEL] "${text}"`);
          pendingReminder.label = text.trim();
          await saveReminder();
          break;
        }
      }
    } catch (err) {
      addBotMsg(`❌ ${esc(err.message)}`, 'error');
      addLog(`❌ ${err.message}`);
    } finally {
      convoBox.classList.remove('thinking');
      brainBusy = false;
    }
  }

  function goToConfirm() {
    state = 'CONFIRM';
    addBotMsg(
      `Spasiti kao:<span class="confirm-label">"${esc(pendingReminder.label)}"</span>` +
      `<span class="confirm-detail">📅 ${esc(pendingReminder.date)}  ⏰ ${esc(pendingReminder.time)}</span>` +
      `<div class="hint-text">Reci "da" ili "promijeni"</div>`,
      'confirm'
    );
    addLog(`→ CONFIRM: "${pendingReminder.label}" @ ${pendingReminder.date} ${pendingReminder.time}`);
  }

  // ---- Speech Recognition ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    unsupportedEl.style.display = 'block';
    unsupportedEl.textContent = 'Speech Recognition nije podržan. Koristi Chrome.';
    micBtn.disabled = true; micBtn.style.opacity = '0.3';
  }
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    unsupportedEl.style.display = 'block';
    unsupportedEl.innerHTML = '⚠️ Mikrofon zahtijeva HTTPS.';
  }

  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (isListening) stopListening();
      langBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      addLog(`🌐 ${btn.textContent} (${currentLang})`);
    });
  });

  function createRecognition() {
    if (!SR) return null;
    const rec = new SR();
    rec.lang = currentLang;
    rec.continuous = false;
    rec.interimResults = false;
    rec.maxAlternatives = 1;

    rec.onresult = (event) => {
      if (event.results.length > 0 && event.results[0].isFinal) {
        const text = event.results[0][0].transcript.trim();
        if (text.length > 0) {
          addLog(`🎙️ "${text}"`);
          addUserMsg(text);
          handleInput(text);
        }
      }
    };

    rec.onerror = (event) => {
      addLog(`❌ Mic: ${event.error}`);
      if (event.error === 'not-allowed') {
        statusEl.textContent = 'mikrofon blokiran';
        isListening = false;
        micBtn.classList.remove('listening');
      }
    };

    rec.onend = () => {
      if (isListening) {
        clearTimeout(restartTimer);
        restartTimer = setTimeout(() => {
          if (isListening) {
            try { const r = createRecognition(); if (r) r.start(); }
            catch(e) { isListening = false; micBtn.classList.remove('listening'); statusEl.textContent = 'tap mikrofon'; statusEl.classList.remove('active'); }
          }
        }, 400);
      } else {
        micBtn.classList.remove('listening');
        statusEl.textContent = 'tap mikrofon za početak'; statusEl.classList.remove('active');
      }
    };

    return rec;
  }

  function startListening() {
    if (!SR) return;
    isListening = true;
    micBtn.classList.add('listening');
    statusEl.textContent = 'slušam...'; statusEl.classList.add('active');
    addLog('🎙️ Mikrofon aktivan');
    try { const r = createRecognition(); if (r) r.start(); }
    catch(e) { addLog(`❌ ${e.message}`); isListening = false; micBtn.classList.remove('listening'); }
  }

  function stopListening() {
    isListening = false;
    clearTimeout(restartTimer);
    micBtn.classList.remove('listening');
    statusEl.textContent = 'tap mikrofon za početak'; statusEl.classList.remove('active');
    addLog('⏹️ Stop');
  }

  micBtn.addEventListener('click', () => { isListening ? stopListening() : startListening(); });

  clearBtn.addEventListener('click', () => {
    convoMessages.innerHTML = '<div class="msg bot">Zdravo! Reci mi šta da zapamtim.</div>';
    logEl.innerHTML = '';
    resetState();
  });

  cancelBtn.addEventListener('click', () => {
    if (state !== 'IDLE') { addBotMsg('❌ Otkazano.', 'error'); resetState(); }
  });

  document.addEventListener('dblclick', e => e.preventDefault());

  // Init Google auth when library loads
  initGoogleAuth();
</script>
